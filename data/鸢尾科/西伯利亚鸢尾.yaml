植物志: '6. 西伯利亚鸢尾（庐山植物园栽培植物手册）

  Iris sibirica L. Sp. Pl. 39. 1753; Dykes, Gen. Iris 20, pl. 1. (a). 1913; B. Fedtsch. in Kom. Fl. URSS 4: 519. 1935; Bailey, Man. Cult. pl. 275. 1949.

  多年生草本，植株基部围有鞘状叶及老叶残留的纤维。根状茎粗壮，斜伸；须根黄白色，绳索状，有皱缩的横纹。叶灰绿色，条形，长20-40厘米，宽0.5-1厘米，顶端渐尖，无明显的中脉。花茎高于叶片，平滑，高40-60厘米，有1-2枚茎生叶；苞片3枚，膜质，绿色，边缘略带红紫色，狭卵形或披针形，长4-5.5厘米，宽0.8-2厘米，顶端短渐尖，内包含有2朵花；花蓝紫色，直径7.5-9厘米；花梗甚短；花被管长约1厘米，外花被裂片倒卵形，长5.5-7厘米，宽3.3-5厘米，上部反折下垂，爪部宽楔形，中央下陷呈沟状，有褐色网纹及黄色斑纹，无附属物，内花被裂片狭椭圆形或倒披针形，长4.5-5.5厘米，宽1.5-1.8厘米，直立；雄蕊长3-3.5厘米，花药紫色，花丝淡紫色；花柱分枝淡蓝色，拱形弯曲，长4-4.5 厘米，顶端裂片近于半圆形，边缘有不规则的稀疏牙齿，子房绿色，纺锤形，长1.5-2厘米。蒴果卵状圆柱形、长圆柱形或椭圆状柱形，长3.5-5.5厘米，直径1.3-1.5厘米，无喙。花期4-5月，果期6-7月。

  原产欧洲。常栽于庭园及花坛中供观赏。模式标本采自欧洲。'
