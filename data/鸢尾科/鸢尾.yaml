学名: Iris tectorum Maxim.
中文名: 鸢尾
俗名:
- 老鸹蒜
- 蛤蟆七
- 扁竹花
- 紫蝴蝶
- 蓝蝴蝶
- 屋顶鸢尾
异名:
- Iris rosthornii
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asparagales-天门冬目(tiān mén dōng mù)
  科: Iridaceae-鸢尾科(yuān wěi kē)
  属: Iris-鸢尾属(yuān wěi shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  株: 植株基部包有老叶残留叶鞘及纤维
  茎: 根状茎粗壮，二歧分枝，径约1厘米
  叶: 叶基生，黄绿色，宽剑形，无明显中脉，长15-50厘米，宽1.5-3.5厘米
  花: 花茎高20-40厘米，顶部常有1-2侧枝；苞片2-3，绿色，草质，披针形，长5-7.5厘米，包1-2花；花蓝紫色，径约10厘米：花被筒细长，上端喇叭形；外花被裂片圆形或圆卵形，长5-6厘米，有紫褐色花斑，中脉有白色鸡冠状附属物，内花被裂片椭圆形，长4-4.5厘米，爪部细：雄蕊长约2.5厘米，花药鲜黄色；花柱分枝扁平，淡蓝色，长约3.5厘米，顶端裂片四方形，子房纺锤状柱形，长1.8-2厘米
  果: 蒴果长椭圆形或倒卵圆形，长5-6厘米
  种子: 种子梨形，黑褐色
生态习性:
  产地: 山西、安徽、江苏、浙江、福建、湖北、湖南、江西、广西、陕西、甘肃、四川、贵州、云南、青海、海南、西藏
  分布: 意大利（传入）、日本（传入）、朝鲜（传入）、喜马拉雅山地区（传入）
  生境: 向阳坡地、林缘及水边湿地
功用价值: 暂无数据
植物志: 根状茎治关节炎、跌打损伤、食积、肝炎等症。对氟化物敏感，可用以鉴测环境污染。
