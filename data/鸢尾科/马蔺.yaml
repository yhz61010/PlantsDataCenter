形态特征:
  识别要点: 本变种花为浅蓝色、蓝色或蓝紫色，花被上有较深色的条纹，多年生密丛草本
  生活型: 多年生密丛草本
  茎: 根状茎粗壮，包有红紫色老叶残留纤维，斜伸
  叶: 叶基生，灰绿色，质坚韧，线形，无明显中脉，长约50厘米，宽4-6毫米
  花: 花茎高3-10厘米；苞片3-5，草质，绿色，边缘膜质，白色，包2-4花；花蓝紫或乳白色，径5-6厘米；花被筒短，长约3毫米；外花被裂片倒披针形，长4.2-4.5厘米，内花被裂片窄倒披针形，长4.2-4.5厘米；雄蕊长2.5-3.2厘米，花药黄色；子房纺锤形，长4-4.5厘米
  果: 蒴果长椭圆状柱形，有短喙，有6肋；种子多面体形，棕褐色，有光泽
生态习性:
  产地: 吉林、内蒙古、青海、新疆、西藏
  分布: 朝鲜、俄罗斯及印度
  生境: 荒地、路旁及山坡草丛中
  物候: 花期5-6月，果期 6-9月
功用价值: 暂无数据
植物志: '本变种花为浅蓝色、蓝色或蓝紫色，花被上有较深色的条纹，其他特征均与白花马蔺相同。

  产黑龙江、吉林、辽宁、内蒙古、河北、山西、山东、河南、安徽、江苏、浙江、湖北、湖南、陕西、甘肃、宁夏、青海、新疆、四川、西藏。生于荒地、路旁、山坡草地，尤以过度放牧的盐碱化草场上生长较多。也产于朝鲜、苏联及印度。

  马蔺习性耐盐碱、耐践踏，根系发达，可用于水土保持和改良盐碱土；叶在冬季可作牛、羊、骆驼的饲料，并可供造纸及编织用；根的木质部坚韧而细长，可制刷子；花和种子入药，马蔺种子中含有马蔺子甲素，可作口服避孕药。'
