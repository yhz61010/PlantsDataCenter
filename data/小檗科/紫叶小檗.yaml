学名: Berberis thunbergii 'Atropurpurea'
中文名: 紫叶小檗
俗名:
- 紫叶女贞
- 紫叶日本小檗
- 红叶小檗
异名:
- Berberis thunbergii var. atropurpurea
描述: 落叶灌木。叶菱状卵形，紫红色。花2-5朵成具短总梗并近簇生的伞形花序，或无总梗而呈簇生状，花梗长5-15毫米，花被黄色；小苞片带红色，长约2毫米，急尖；外轮萼片卵形，长4-5毫米，宽约2.5毫米，先端近钝，内轮萼片稍大于外轮萼片；花瓣长圆状倒卵形，长5.5-6毫米，宽约3.5毫米，先端微缺，基部以上腺体靠近；雄蕊长3-3.5毫米，花药先端截形。浆果红色，椭圆体形，长约10毫米，稍具光泽，含种子1-2颗。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Ranunculales-毛茛目(máo gèn mù)
  科: Berberidaceae-小檗科(xiǎo bò kē)
  属: Berberis-小檗属(xiǎo bò shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶灌木。
  枝: 幼枝淡红带绿色，无毛，老枝暗红色具条棱；节间长1-1.5厘米。
  叶: 叶菱状卵形，长5-20（35）毫米，宽3-15毫米，先端钝，基部下延成短柄，全缘，表面黄绿色，背面带灰白色，具细乳突，两面均无毛。
  花: 花2-5朵成具短总梗并近簇生的伞形花序，或无总梗而呈簇生状，花梗长5-15毫米，花被黄色；小苞片带红色，长约2毫米，急尖；外轮萼片卵形，长4-5毫米，宽约2.5毫米，先端近钝，内轮萼片稍大于外轮萼片；花瓣长圆状倒卵形，长5.5-6毫米，宽约3.5毫米，先端微缺，基部以上腺体靠近；雄蕊长3-3.5毫米，花药先端截形。
  果: 浆果红色，椭圆体形，长约10毫米，稍具光泽，含种子1-2颗。
生态习性:
  产地: 原产日本，中国各省市广泛栽培。
  物候: 花期4-6月，果期7-10月。
功用价值:
  经济价值: 我国大部分省区、特别是各大城市常栽培于庭园中或路旁作绿化或绿篱用。
  植物文化: '食檗不易食梅难，檗能苦兮梅能酸。

    未如生别之为难，苦在心兮酸在肝。

    晨鸡再鸣残月没，征马连嘶行人出。

    回看骨肉哭一声，梅酸檗苦甘如蜜。

    黄河水白黄云秋，行人河边相对愁。

    天寒野旷何处宿，棠梨叶战风飕飕。

    生离别，生离别，忧从中来无断绝。

    忧极心劳血气衰，未年三十生白发。

    ——唐 白居易《生离别》'
