学名: Paeonia × suffruticosa Andrews
中文名: 牡丹
俗名:
- 鼠姑
- 鹿韭
- 白茸
- 木芍药
- 百雨金
- 洛阳花
- 富贵花
异名:
- Paeonia suffruticosa var. purpurea
- Paeonia papaveracea
- Paeonia moutan
- Paeonia fruticosa
- Paeonia suffruticosa var. papaveracea
- Paeonia frutescens
- Paeonia moutan var. anneslei
- Paeonia chinensis
- Paeonia sinensis
- Paeonia suffruticosa f. anneslei
- Paeonia yunnanensis
描述: 落叶灌木；叶常为二回三出复叶；花单生枝顶，花瓣5或为重瓣。被誉为花中之王，根皮供药用，广泛栽培。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Saxifragales-虎耳草目(hǔ ěr cǎo mù)
  科: Paeoniaceae-芍药科(sháo yào kē)
  属: Paeonia-芍药属(sháo yao shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶灌木
  茎: 茎高达2米；分枝短而粗
  叶: 叶常为二回三出复叶；顶生小叶宽卵形，长7-8厘米，3裂至中部，裂片不裂或2-3浅裂，上面绿色，无毛，下面淡绿色，有时具白粉，无毛，小叶柄长1.2-3厘米；侧生小叶窄卵形或长圆状卵形，长4.5-6.5厘米，不等2裂至3浅裂或不裂，近无柄；叶柄长5-11厘米，和叶轴均无毛
  花: 花单生枝顶，苞片5，萼片5，花瓣5，或为重瓣，玫瑰、红紫或粉红色至白色，倒卵形；心皮5，稀更多，密生柔毛
  果: 蓇葖长圆形，密生黄褐色硬毛
生态习性:
  物候: 花期4-5月，果期8-9月
功用价值:
  经济价值: 根皮供药用，称“丹皮”；为镇痉药，能凉血散瘀，治中风、腹痛等症
  植物文化: 庭前芍药妖无格，池上芙蕖净少情； 唯有牡丹真国色，花开时节动京城； ——唐 刘禹锡《赏牡丹》
植物志: 暂无数据
元数据:
  来源文件: SY-芍药科.xlsx
  来源工作表: 牡丹
备注: '可能由产我国陕西延安一带的矮牡丹 P. suffruticosa var. spontanea 引种而来。目前全国栽培甚广，并早已引种国外。在栽培类型中，主要根据花的颜色，可分成上百个品种。

  根皮供药用，称“丹皮”；为镇痉药，能凉血散瘀，治中风、腹痛等症。'
