学名: Rhus typhina L.
中文名: 火炬树
俗名:
- 鹿角漆
- 火炬漆
- 加拿大盐肤木
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Sapindales-无患子目(wú huàn zǐ mù)
  科: Anacardiaceae-漆树科(qī shù kē)
  属: Rhus-盐麸木属(yán fū mù shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶灌木或小乔木
  株: 高4～8 m，树形不整齐
  枝: 小枝粗壮，红褐色，密生绒毛
  叶: 叶轴无翅，小叶19～23，长椭圆状披针形，长5～12 cm，先端长渐尖，有锐锯齿
  花: 雌雄异株，圆锥花序长10～20 cm，直立，密生绒毛；花白色
  果: 核果深红色，密被毛，密集成火炬形
生态习性:
  分布: 原产北美、我国1959年引入、现华北、西北常见栽培
  物候: 花期6～7月；果期9～10月
  栽培: 适应性强；喜光，耐寒；在酸性、中性和石灰性土壤上均可生长，耐干旱瘠薄，耐盐碱；根系发达，萌蘖力极强；生长速度较快
功用价值:
  经济价值: 火炬树适应性强，秋叶红艳，果序红色而且形似火炬，冬季在树上宿存，颇为奇特，可用于华北、西北等地的干旱瘠薄山区造林绿化、护坡固堤及封滩固沙；也可用于园林中丛植以赏红叶和红果，增添野趣
植物志: 暂无数据
