学名: Acer negundo L.
中文名: 梣叶槭
俗名:
- 糖槭
- 白蜡槭(bái là qì)
- 美国槭
- 复叶槭(fù yè qì)
- 羽叶槭
异名:
- Acer fauriei
描述: 落叶乔木，高达20 m。小枝光滑，有白粉。奇数羽状复叶；小叶3～7，卵形至椭圆状披针形，长8～10 cm，宽2～4 cm，常有3～5个粗锯齿，顶生小叶3浅裂。雌雄异株，雄花序聚伞状，雌花序总状，均由无叶的小枝旁生出，常下垂。花小，黄绿色，无花瓣及花盘，雄蕊4～6，子房无毛。果翅狭长，两翅成锐角或近于直角。花期4～5月；果期8～9月。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Sapindales-无患子目(wú huàn zǐ mù)
  科: Sapindaceae-无患子科(wú huàn zǐ kē)
  属: Acer-槭属(qì shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶乔木
  株: 高达20米
  茎: 树皮黄褐色或灰褐色
  枝: 小枝无毛
  叶: 羽状复叶，小叶3-5(7-9)，小叶纸质，卵圆形或椭圆状披针形，长8-10厘米，宽2-4厘米，先端渐尖，基部楔形，具3-5对粗锯齿，下面淡绿色，脉腋被族生毛，侧脉5-7对；叶柄长5-7厘米
  花: 花单性，雌雄异株；花梗长1.5-3厘米；无花瓣，无花盘；雄蕊4-6，花丝长；子房无毛
  果: 小坚果凸起，近于长圆形或长圆卵形，无毛；翅宽8-10毫米，稍向内弯，连同小坚果长3-3.5厘米，张开成锐角或近于直角
生态习性:
  产地: 近百年内始引种于我国，、在辽宁、内蒙古、河北、山东、河南、陕西、甘肃、新疆，江苏、浙江、江西、湖北等省区的各主要城市都有栽培；在东北和华北各省市生长较好
  分布: 原产北美洲
  物候: 花期4-5月，果期9月
功用价值:
  经济价值: 本种早春开花，花蜜很丰富，是很好的蜜源植物。本种生长迅速，树冠广阔，夏季遮荫条件良好，可作行道树或庭园树，用以绿化城市或厂矿。
植物志: '原产北美洲。近百年内始引种于我国，、在辽宁、内蒙古、河北、山东、河南、陕西、甘肃、新疆，江苏、浙江、江西、湖北等省区的各主要城市都有栽培。在东北和华北各省市生长较好。

  本种早春开花，花蜜很丰富，是很好的蜜源植物。本种生长迅速，树冠广阔，夏季遮荫条件良好，可作行道树或庭园树，用以绿化城市或厂矿。'
