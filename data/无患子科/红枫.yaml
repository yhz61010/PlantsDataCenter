学名: Acer palmatum 'Atropurpureum'
中文名: 红枫
俗名:
- 红鸡爪槭(hóng jī zhǎo qì)
- 紫红鸡爪槭(zǐ hóng jī zhǎo qì)
异名:
- Acer palmatum var. atropurpureum
描述: 园艺种。落叶小乔木，高5～8 m；树冠伞形，枝条开张，细弱。单叶对生，近圆形，薄纸质，掌状7～9深裂，裂深常为全叶片的1/2～1/3，基部心形，裂片卵状长椭圆形至披针形，先端尖，有细锐重锯齿，背面脉腋有白簇毛。伞房花序径约6～8 mm，萼片暗红色，花瓣紫色。果长1～2.5 cm，两翅开展成钝角。花期5月；果期9～10月。叶片常年红色或紫红色，枝条紫红色。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Sapindales-无患子目(wú huàn zǐ mù)
  科: Sapindaceae-无患子科(wú huàn zǐ kē)
  属: Acer-槭属(qì shǔ)
