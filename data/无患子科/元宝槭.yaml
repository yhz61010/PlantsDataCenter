学名: Acer truncatum Bunge
中文名: 元宝槭
俗名:
- 槭
- 五脚树
- 平基槭
- 元宝树
- 元宝枫
- 五角枫
- 华北五角枫
异名:
- Acer lobulatum
- Acer pictum var. truncatum
- Acer lobulatum var. rubripes
- Acer lobelii subsp. truncatum
- Acer laetum var. truncatum
- Acer truncatum f. cordatum
- Acer truncatum var. beipiao
- Acer cappadocicum subsp. truncatum
- Acer pictum subsp. truncatum
- Acer platanoides var. truncatum
- Acer truncatum var. acuminatum
- Acer truncatum var. nudum
描述: 落叶乔木，高达10米。单叶，5(7)深裂，长5-12厘米，宽8-12厘米，裂片三角状卵形,基部平截，稀微心形，全缘，幼叶下面脉腋具簇生毛，基脉5,掌状；叶柄长3-13厘米。伞房花序顶生；雄花与两性花同株。萼片5，黄绿色；花瓣5，黄或白色，矩圆状倒卵形；雄蕊8，着生于花盘内缘。小坚果果核扁平，脉纹明显，基部平截或稍圆，翅矩圆形，常与果核近等长，两翅成钝角。花期5月，果期9月。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Sapindales-无患子目(wú huàn zǐ mù)
  科: Sapindaceae-无患子科(wú huàn zǐ kē)
  属: Acer-槭属(qì shǔ)
物种保护:
  濒危等级: 无
分类信息:
  模式产地: 模式标本采自北京郊区
形态特征:
  生活型: 落叶乔木
  株: 高达10米
  茎: 树皮灰褐色或深褐色，深纵裂。
  枝: 小枝无毛，当年生枝绿色，多年生枝灰褐色，具圆形皮孔。冬芽小，卵圆形；鳞片锐尖，外侧微被短柔毛。
  叶: 单叶，5(7)深裂，长5-12厘米，宽8-12厘米，裂片三角状卵形，基部平截，稀微心形，全缘，幼叶下面脉腋具簇生毛，基脉5，掌状；叶柄长3-13厘米
  花: 伞房花序顶生；雄花与两性花同株；萼片5，黄绿色；花瓣5，黄或白色，矩圆状倒卵形；雄蕊8，着生于花盘内缘
  果: 小坚果果核扁平，脉纹明显，基部平截或稍圆，翅矩圆形，常与果核近等长，两翅成钝角
生态习性:
  产地: 吉林、辽宁、内蒙古、河北、山西、山东、江苏北部（徐州以北地区）、河南、陕西、及甘肃等省区
  生境: 疏林中
  海拔: 400-1000m
  物候: 花期5月，果期9月
功用价值:
  经济价值: 本种在北京附近已多栽培，是一种很好的庭园树和行道树，如在华北各省大量推广繁殖，作为行道树，不仅引种容易，而且树冠很大，具备良好蔽荫条件，不亚于近数十年中由几外国引种的法国梧桐、洋槐等树；种子含油丰富，可作工业原料，木材细密可制造各种特殊用具，并可作建筑材料
  植物文化: '枫叶微红近有霜，碧云秋色满吴乡；

    鱼冲骇浪雪鳞健，鸦闪夕阳金背光；

    心为感恩长惨戚，鬓缘经乱早苍浪；

    可怜广武山前语，楚汉宁教作战场；

    ——唐 韩偓《秋郊闲望有感》'
植物志: '产吉林、辽宁、内蒙古、河北、山西、山东、江苏北部（徐州以北地区）、河南、陕西、及甘肃等省区。生于海拔400-1000米的疏林中。模式标本采自北京郊区。

  本种在北京附近已多栽培，是一种很好的庭园树和行道树，如在华北各省大量推广繁殖，作为行道树，不仅引种容易，而且树冠很大，具备良好蔽荫条件，不亚于近数十年中由几外国引种的法国梧桐、洋槐等树。种子含油丰富，可作工业原料，木材细密可制造各种特殊用具，并可作建筑材料。

  本种在黄河流域的下游分布很广。著者认为我国古代叫做槭树，利用很广的就是本种。'
