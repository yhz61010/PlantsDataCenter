学名: Rhododendron mucronulatum Turcz.
中文名: 迎红杜鹃
俗名:
- 无
异名:
- Rhododendron dauricum var. mucronulatum
- Rhododendron dauricum subsp. mucronulatum
- Rhododendron mucronulatum var. albiflorum
- Rhododendron mucronulatum var. chejuense
- Rhododendron mucronulatum var. taquetii
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Ericales-杜鹃花目(dù juān huā mù)
  科: Ericaceae-杜鹃花科(dù juān huā kē)
  属: Rhododendron-杜鹃花属(dù juān huā shǔ)
物种保护:
  濒危等级: 无危(LC)
分类信息: 暂无数据
形态特征:
  生活型: 落叶灌木
  枝: 新枝叶生于花芽下面叶腋；小枝细长，疏生鳞片
  叶: 叶散生，纸质，长圆形或卵状披针形，长3-6(-8)厘米，边缘稍波状，上面幼时沿脉被微毛，疏被白色鳞片，下面淡绿色，疏被鳞片，其相距为其直径2-4倍；叶柄长3-5毫米
  花: 花梗长0.5-1厘米，被鳞片；花萼小，环状或5齿裂，被鳞片；花冠淡红紫色，宽漏斗状，长2.4-3厘米，外面被微毛，裂片边缘呈波状；雄蕊10，不超过花冠，花丝下部被毛；子房密被鳞片，花柱较花冠长
  果: 蒴果圆柱形，长1-1.5厘米，暗褐色，密被鳞片
生态习性:
  产地: 内蒙古（北达满洲里）、辽宁、河北、山东、江苏北部
  分布: 蒙古、日本、朝鲜、俄罗斯（西伯利亚东南、阿穆尔）
  生境: 山地灌丛
  物候: 花期4-6月，果期5-7月
功用价值: 暂无数据
植物志: 产内蒙古（北达满洲里）、辽宁、河北、山东、江苏北部。生于山地灌丛。蒙古、日本、朝鲜、俄罗斯（西伯利亚东南、阿穆尔）有分布。
