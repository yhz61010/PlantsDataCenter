物种保护:
  濒危等级: 无危(LC)
分类信息:
  模式产地: 模式标本采自山东泰山
形态特征:
  生活型: 多年生草本
  株: 高达50厘米
  茎: 茎疏丛生
  叶: 叶线状披针形，长3-5厘米，宽2-4厘米，先端渐尖，基部稍窄，全缘或具微齿
  花: 花单生或成聚伞花序；花梗长1-3厘米；苞片4，卵形，长渐尖，长达花萼1/2以上；花萼筒形，长1.5-2.5厘米，径4-5毫米，具纵纹，萼齿披针形，长约.5毫米，先端尖；花瓣长1.6-1.8厘米，瓣片倒卵状三角形，长1.3-1.5厘米，紫红、粉红、鲜红或白色，先端不整齐齿裂，喉部具斑纹，疏生髯毛；雄蕊筒形，包于宿萼内，顶端4裂
  种子: 种子扁圆形
生态习性:
  产地: 山东泰山及东北部沿海
  分布: 朝鲜（北部）
  生境: 山坡、海边
  物候: 花期5-6月，果期7-9月
功用价值: 暂无数据
植物志: '原产我国北方，现在南北普遍生长。生于草原和山坡草地。俄罗斯西伯利亚和朝鲜也有。

  现已广泛栽培。育出许多品种，是很好的观赏花卉。根和全草入药，清热利尿，破血通经，散瘀消肿。'
