学名: Trifolium pratense L.
中文名: 红车轴草
俗名:
- 红三叶
- '红三叶草(hóng sān yè cǎo)

  三叶草(sān yè cǎo)

  红菽草(hóng shū cǎo)'
异名:
- Trifolium pratense var. sativum
描述: 多年生草本，高30–80厘米。茎直立。三出复叶互生，小叶卵形，边缘有细锯齿，叶面有V形白斑。头状花序顶生，花紫红色。荚果小，倒卵形。花期5–7月，果期8–9月。原产欧亚大陆，我国各地栽培。耐寒、耐阴，为优良牧草、绿肥、蜜源植物，全草可入药。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Fabales-豆目(dòu mù)
  科: Fabaceae-豆科(dòu kē)
  属: Trifolium-车轴草属(chē zhóu cǎo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 短期多年生草本，生长期2-5 (-9) 年
  根: 主根深入土层达1米
  茎: 茎粗壮，具纵棱，直立或平卧上升，疏生柔毛或秃净
  叶: 掌状三出复叶；托叶近卵形，膜质，每侧具脉纹8-9条，基部抱茎，先端离生部分渐尖，具锥刺状尖头；叶柄较长，茎上部的叶柄短，被伸展毛或秃净；小叶卵状椭圆形至倒卵形，长1.5-3.5 (-5) 厘米，宽1-2厘米，先端钝，有时微凹，基部阔楔形，两面疏生褐色长柔毛，叶面上常有V字形白斑，侧脉约15对，作20°角展开在叶边处分叉隆起，伸出形成不明显的钝齿；小叶柄短，长约1.5毫米
  花: 花序球状或卵状，顶生；无总花梗或具甚短总花梗，包于顶生叶的托叶内，托叶扩展成焰苞状，具花30-70朵，密集；花长12-14 (-18) 毫米；几无花梗；萼钟形，被长柔毛，具脉纹10条，萼齿丝状，锥尖，比萼筒长，最下方1齿比其余萼齿长1倍，萼喉开张，具一多毛的加厚环；花冠紫红色至淡红色，旗瓣匙形，先端圆形，微凹缺，基部狭楔形，明显比翼瓣和龙骨瓣长，龙骨瓣稍比冀瓣短；子房椭圆形，花柱丝状细长，胚珠1-2粒
  果: 荚果卵形；通常有1粒扁圆形种子
生态习性:
  分布: 原产欧洲中部，引种到世界各国
  生境: 我国南北各省区均有种植，并见逸林缘、路边、草地等湿润处
  物候: 花果期5-9月
功用价值: 暂无数据
植物志: 原产欧洲中部，引种到世界各国。我国南北各省区均有种植，并见逸生于林缘、路边、草地等湿润处。
