学名: Trifolium repens L.
中文名: 白车轴草
俗名:
- 荷兰翘摇
- 白三叶
- 三叶草
- 白花苜蓿(bái huā mù xu)
- 三消草(sān xiāo cǎo)
- 螃蟹草(páng xiè cǎo)
异名:
- Lotodes repens
描述: 多年生草本，高10–30厘米，具匍匐茎。三出复叶互生，小叶倒卵形，边缘有细齿，叶面有V形白斑。头状花序腋生，花白色。荚果倒卵状椭圆形。花期5–6月，果期8–9月。原产欧洲，我国各地广泛栽培。耐践踏、再生力强，为优良草坪草、牧草、绿肥、蜜源植物。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Fabales-豆目(dòu mù)
  科: Fabaceae-豆科(dòu kē)
  属: Trifolium-车轴草属(chē zhóu cǎo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本
  株: 生长期达5年；|高10-30厘米，全株无毛
  茎: 茎匍匐蔓生，上部稍上升，节上生根，掌状三出复叶；托叶卵状披针形，基部抱茎成鞘状，离生部分锐尖；叶柄长10-30厘米；小叶倒卵形或近圆形，长0.8-3厘米，中脉在下面隆起，侧脉约13对，在两面隆起，近叶边分叉并伸达齿尖；小叶柄长1.5毫米，微被柔毛
  叶: 掌状三出复叶，小叶倒卵形或近圆形
  花: 花序球形，顶生，径1.5-4厘米，具20-50密集的花；花序梗甚长，比叶柄长近1倍；无总苟；苞片披针形；花长0.7-1.2厘米；花梗比花萼稍长或等长，开花立即下垂；花萼钟形，具10条脉纹，萼齿5，披针形，稍不等长，短于萼筒，萼喉开张，无毛；花冠白、乳黄或淡红色，具香气，旗瓣椭圆形，比翼瓣和龙骨瓣长近1倍，龙骨瓣稍短于翼瓣；子房线状长圆形，花柱稍长于子房
  果: 荚果长圆形，常具3种子
  种子: 种子宽卵圆形
生态习性:
  分布: 原产欧洲和北非，世界各地均有栽培
  生境: 我国常见于种植，并在湿润草地、河岸、路边呈半自生状态
  物候: 花果期5-10月
功用价值:
  经济价值: 为优良牧草，可作为绿肥、绿化，以及蜜源和药材等用
植物志: '原产欧洲和北非，世界各地均有栽培。我国常见于种植，并在湿润草地、河岸、路边呈半自生状态。

  本种为优良牧草，含丰富的蛋白质和矿物质，抗寒耐热，在酸性和碱性土壤上均能适应，是本属植物中在我国很有推广前途的种。可作为绿肥、堤岸防护草种、草坪装饰，以及蜜源和药材等用。国外学者常把本种从地理上、形态上的差异分成一些亚种、变种，以及农业上育成的栽培品种。'
