学名: Ipomoea mauritiana Jacq.
中文名: 七爪龙
俗名:
- 苦瓜藤
- 山水瓜
- 山东管
- 五爪龙(wǔ zhǎo lóng)
- 野商陆
- 野牵牛
- 五爪薯(wǔ zhǎo shǔ)
- 栅手(zhà shǒu)
- 千斤藤
- 牛乳薯
- 细种五爪龙(xì zhǒng wǔ zhǎo lóng)
- 藤商陆(yě shāng lù)
异名:
- Ipomoea digitata
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Solanales-茄目(qié mù)
  科: Convolvulaceae-旋花科(xuán huā kē)
  属: Ipomoea-番薯属(fān shǔ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本
  株: 长达10米
  根: 根粗壮，稍肉质
  茎: 茎缠绕
  叶: 叶近圆形，长7-18厘米，掌状5-7深裂，裂片披针形或椭圆形，全缘或不规则波状；叶柄长3-11厘米
  花: 聚伞花序腋生，具少花至多花，花序梗长2.5-20厘米；苞片早落；花梗长0.9-2.2厘米；外萼片长圆形，长7-9毫米，先端钝，内萼片宽卵形，长0.9-1厘米；花冠淡红或红紫色，漏斗状，长5-6厘米；雄蕊及花柱内藏
  果: 蒴果卵球形，长1.2-1.4厘米，4瓣裂；种子4，长约6毫米，被长绢毛，易脱落
  种子: 种子4，黑褐色，长约6毫米，基部被长绢毛，毛比种子长约1倍，易脱落
生态习性:
  产地: 台湾、广东及其沿海岛屿、广西、云南南部
  分布: 越南，热带地区
  生境: 海滩边矮林、山地疏林或溪边灌丛
  海拔: 280-1020m
  物候: 花期夏秋
功用价值: 暂无数据
植物志: '产我国台湾、广东及其沿海岛屿、广西、云南南部。海拔280-1020米的海滩边矮林、山地疏林或溪边灌丛。越南也有，分布于热带地区。

  块根磨碎用以消肿及泻下；块根还可提取淀粉，可食用。植株栽培供观赏。'
