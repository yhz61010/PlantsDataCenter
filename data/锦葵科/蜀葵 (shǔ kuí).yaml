学名: Alcea rosea L.
中文名: 蜀葵 (shǔ kuí)
俗名:
- 饽饽团子
- 斗蓬花
- 栽秧花
- 棋盘花
- 麻杆花
- 一丈红
- 淑气
- 熟芨花
- 小出气
异名:
- Althaea rosea
- Althaea sinensis
- Althaea rosea var. sinensis
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Malvales-锦葵目(jǐn kuí mù)
  科: Malvaceae-锦葵科(jǐn kuí kē)
  属: Alcea-蜀葵属(shǔ kuí shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 二年生直立草本
  株: 高达2米，茎枝密被刺毛
  茎: 茎枝密被星状毛和刚毛
  叶: 叶近圆心形，直径6-16厘米，掌状5-7浅裂或波状棱角，上疏被星状柔毛、粗糙，下被星状长硬毛或绒毛；叶柄长5-15厘米，被星状长硬毛；托叶卵形，长约8毫米，先端具3尖
  花: 花呈总状花序顶生单瓣或重瓣，有紫、粉、红、白等色；花期6-8月，蒴果，种子扁圆，肾形；喜阳光，耐半阴，忌涝
  果: 果盘状，直径约2厘米，被短柔毛，具纵槽
  种子: 种子肾形
生态习性:
  产地: 在中国分布很广，华东、华中、华北均有种植
  物候: 花期2-8月
功用价值: 暂无数据
植物志: '本种系原产我国西南地区，全国各地广泛栽培供园林观赏用。世界各国均有栽培供观赏用

  全草入药，有清热止血、消肿解毒之功，治吐血、血崩等症。茎皮含纤维可代麻用。'
元数据:
  来源文件: JK-锦葵科.xlsx
  来源工作表: 蜀葵
备注: 模式产地：原产四川，故名曰蜀葵
