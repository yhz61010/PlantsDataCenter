学名: Pelargonium × hortorum L.H.Bailey
中文名: 天竺葵
俗名:
- 臭海棠
- 洋绣球
- 入腊红
- 石腊红
- 日烂红
- 洋葵
- 驱蚊草
- 蝴蝶梅
异名: 无
描述: 其它信息详见“马蹄纹天竺葵”工作表
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Geraniales-牻牛儿苗目(máng niú ér miáo mù)
  科: Geraniaceae-牻牛儿苗科(máng niú ér miáo kē)
  属: Pelargonium-天竺葵属
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  识别要点: 另有近似种马蹄纹天竺葵 P. zonale Aif. 其主要区别为茎通常单生，仅幼时略被绒毛；花较小。
  生活型: 多年生草本
  株: 高达60厘米
  茎: 茎直立，基部木质化，密被柔毛，具鱼腥味
  叶: 叶互生；托叶宽三角形或卵形，被柔毛和腺毛，叶圆形或肾形，基部心形，径3-7厘米，边缘波状浅裂，具圆齿，两面被透明柔毛，上面叶缘以内有暗红色马蹄形环纹
  花: 花梗长3-4厘米，被柔毛和腺毛；萼片窄披针形，长0.8-1厘米，密被腺毛和长柔毛；花瓣红、橙红、粉红或白色，宽倒卵形，长1.2-1.5厘米，先端圆，下面3枚常较大
  果: 果长约3厘米，被柔毛
生态习性:
  产地: 我国各地普遍栽培
  分布: 原产非洲南部
  物候: 花期5-7月，果期6-9月
功用价值: 暂无数据
