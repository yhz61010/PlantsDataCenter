植物志: '7. 鼠掌老鹳草（中国高等植物图鉴）图版8：1

  Geranium sibiricum L. Sp. Pl. 683. 1753; Edgew. et Hook. f. in Hook. f. Fl. Brit. Ind. 1: 431. 1875; R. Knuth. in Engl. Pflanzenr. Heft 53. 4 (129); 195. 1912; Kitag. Lineam. Fl. Mansh. 197. 1939; Bobr. in Schischk. et Bobr. Fl. URSS 14: 57. 1949; 中国高等植物图鉴2: 530. 图2784. 1972; 东北草本植物志 6: 16. 1977; 内蒙古植物志4: 3. 1979; 西藏植物志3: 5. 1986; 横断山区维管植物1: 1026. 1993.

  一年生或多年生草本，高30-70厘米，根为直根，有时具不多的分枝。茎纤细，仰卧或近直立，多分枝，具棱槽，被倒向疏柔毛。叶对生；托叶披针形，棕褐色，长8-12厘米，先端渐尖，基部抱茎，外被倒向长柔毛；基生叶和茎下部叶具长柄，柄长为叶片的2-3倍；下部叶片肾状五角形，基部宽心形，长3-6厘米，宽4-8厘米，掌状5深裂，裂片倒卵形、菱形或长椭圆形，中部以上齿状羽裂或齿状深缺刻，下部楔形，两面被疏伏毛，背面沿脉被毛较密；上部叶片具短柄，3-5裂。总花梗丝状，单生于叶腋，长于叶，被倒向柔毛或伏毛，具1花或偶具2花；苞片对生，棕褐色、钻伏、膜质，生于花梗中部或基部；萼片卵状椭圆形或卵状披针形，长约5毫米，先端急尖，具短尖头，背面沿脉被疏柔毛；花瓣倒卵形，淡紫色或白色，等于或稍长于萼片，先端微凹或缺刻状，基部具短爪；花丝扩大成披针形，具缘毛；花柱不明显，分枝长约1毫米。蒴果长15-18毫米，被疏柔毛，果梗下垂。种子肾状椭圆形，黑色，长约2毫米，宽约1毫米。花期6-7月，果期8-9月。

  分布于东北、华北、湖北、西北、西南。生于林缘、疏灌丛、河谷草甸或为杂草。欧洲、高加索、中亚、俄罗斯西伯利亚、蒙古、朝鲜和日本北部皆有分布。'
