形态特征:
  生活型: 多年生草本
  株: 高达70厘米
  根: 具直根
  茎: 茎仰卧或近直立，疏被倒向柔毛
  叶: 叶对生，肾状五角形，基部宽心形，掌状5深裂，裂片倒卵形至长椭圆形，先端锐尖
  花: 花序梗粗，腋生，多具1花；萼片卵状椭圆形或卵状披针形，花瓣倒卵形，白或淡紫红色，先端微凹或缺刻
  果: 蒴果疏被柔毛，果柄下垂
生态习性:
  产地: 东北、华北、湖北、西北、西南
  分布: 欧洲、高加索、中亚、俄罗斯西伯利亚、蒙古、朝鲜和日本北部皆
  生境: 林缘、疏灌丛、河谷草甸或为杂草
  物候: 花期6-7月，果期8-9月
