备注: '马蹄纹天竺葵：名称强调叶片上常见的深色环带或马蹄形斑纹。原种 Pelargonium zonale 是一个正式物种，也是现代马蹄纹／环纹型园艺天竺葵的重要亲本之一；但花坛和市场中常见植株多数属于 Pelargonium × hortorum 或 Zonal Pelargonium Group，不能全部直接鉴定为原种 P. zonale。

  直立天竺葵：强调植株直立、紧凑、灌丛状的生长姿态，常用于区别常春藤叶天竺葵等蔓生、垂吊类型。它属于园艺常用名称，通常指 Zonal Pelargonium Group，与“马蹄纹天竺葵”所指范围高度重合，但并不是严格的植物学分类名称。

  《中国植物志》 第43(1)卷 (1998) >> 085页 PDF >> 马蹄纹天竺葵 Pelargonium zonale'
