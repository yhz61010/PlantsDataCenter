植物志: '百合（变种）图版31: 1-6

  var. viridulum Baker in Gard. Chron. ser. 2, 24: 134. 1885; et ser. 3, 10: 225. 1891. ——L. brownii var. colchesteri (Van Houtte) Wilson ex Elwes in Gard. Chron. ser. 3, 70: 101. 1921, in obs.

  本变种与野百合的区别在于叶倒披针形至倒卵形。

  产于河北、山西、河南、陕西、湖北、湖南、江西、安徽和浙江。生于山坡草丛中、疏林下、山沟旁、地边或村旁，也有栽培，海拔300-920米。

  鲜花含芳香油，可作香料；鳞茎含丰富淀粉，是一种名贵食品，亦作药用，有润肺止咳、清热、安神和利尿等功效。'
