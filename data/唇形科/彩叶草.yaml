学名: Coleus hybridus Hort. ex Cobeau
中文名: 彩叶草
俗名: 无
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Lamiaceae-唇形科(chún xíng kē)
  属: Coleus-鞘蕊花属
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 直立或上升草本，茎四棱形，通常紫色
  茎: 茎四棱形，通常紫色
  叶: 叶大小、形状变异很大，通常卵圆形，先端钝至短渐尖，基部阔楔形至圆形，边缘有圆齿，色泽多样，有黄，暗红，紫色及绿色
  花: 轮伞花序多花，多数密集排列成长5-10cm，宽3-8cm的简单或分枝的圆锥花序，花萼钟形，花冠淡紫色、蓝色，冠檐二唇形，上唇短，直立，4裂，下唇较长，内凹，舟状
  果: 小坚果
生态习性:
  分布: 原产于热带亚洲、现在世界各国广泛栽培、国内各地常见
  物候: 花期8-9月
  栽培: 喜光照充足和温暖湿润的生态环境，要求水肥条件好，土壤肥沃、疏松、透气的砂质壤土；在盐碱及重粘土地不适宜或生长不良，不耐寒，不耐水淹；生长适温为15℃-30℃
功用价值:
  经济价值: 彩叶草姿态多变，叶色绚丽多彩，多用于园路边、林缘大片种植，以营造不同的色块，也常用于花坛、花境作配材
植物志: 暂无数据
