学名: Salvia splendens Ker Gawl.
中文名: 一串红
俗名:
- 爆仗红
- 炮仔花
- 象牙海棠
- 墙下红
- 西洋红
- 象牙红
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Lamiaceae-唇形科(chún xíng kē)
  属: Salvia-鼠尾草属(shǔ wěi cǎo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 草本或亚灌木状
  株: 高达90厘米
  茎: 茎钝四稜形，具浅槽，无毛
  叶: 叶卵形或三角状卵形，长2.5-7厘米，先端渐尖，基部平截或近圆，具锯齿，两面无毛，下面被腺点；叶柄长3-4.5厘米，无毛
  花: 轮伞花序2-6花，组成顶生总状花序，花序长达20厘米或以上；苞片卵圆形，红色，大，在花开前包裹着花蕾，先端尾状渐尖；花梗长4-7毫米，密被染红的具腺柔毛，花序轴被微柔毛；花萼钟形，红色，开花时长约1.6厘米，花后增大达2厘米，外面沿脉上被染红的具腺柔毛，内面在上半部被微硬伏毛，二唇形，唇裂达花萼长1/3，上唇三角状卵圆形，长5-6毫米，宽10毫米，先端具小尖头，下唇比上唇略长，深2裂，裂片三角形，先端渐尖
  果: 小坚果暗褐色，顶端不规则绉褶，边缘具窄翅
生态习性:
  分布: 原产巴西，我国各地庭园中广泛栽培，作观赏用，本种为一美丽的盆栽花卉
  物候: 花盘等大
功用价值: 暂无数据
植物志: '原产巴西，我国各地庭园中广泛栽培，作观赏用，本种为一美丽的盆栽花卉，

  花有各种颜色，由大红至紫，甚至有白色的。'
