学名: Salvia farinacea Benth.
中文名: 蓝花鼠尾草
俗名:
- 粉萼鼠尾草
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Lamiaceae-唇形科(chún xíng kē)
  属: Salvia-鼠尾草属(shǔ wěi cǎo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 一、二年生或多年生草本植物及常绿小灌木
  株: 蓝花鼠尾草
  叶: 叶对生，呈长椭圆形，先端圆，全缘（或有钝锯齿）
  种子: 种子近椭圆形
生态习性:
  产地: 地中海沿岸及南欧
  物候: 花轮生于茎顶或叶腋，花呈紫、青色，有时白色，具有强烈芳香
  栽培: 性喜温暖及全日照环境，较耐热，不耐寒，耐瘠，但以肥沃、排水良好的壤土为佳；生长适温15-28℃
功用价值:
  经济价值: 本种花具芳香，色泽典雅清幽，在世界园林中广为应用，可用于公园、植物园、绿地等成片种植，或用于花境与其他观花植物搭配种植，也可用于岩石旁、墙边、庭院点缀
