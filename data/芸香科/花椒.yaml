形态特征:
  生活型: 落叶小乔木或灌木状
  株: 高达7米
  茎: 茎干被粗壮皮刺，小枝刺基部宽扁直伸，幼枝被柔毛
  叶: 奇数羽状复叶，叶轴具窄翅，小叶5-13，对生，无柄，纸质，卵形、椭圆形，稀披针形或圆形，长2-7厘米，宽1-3.5厘米，先端尖或短尖；基部宽楔形或近圆，两侧稍不对称，具细锯齿，齿间具油腺点，上面无毛，下面基部中脉两侧具簇生毛
  花: 聚伞状圆锥花序顶生，长2-5厘米，花序轴及花梗密被柔毛或无毛；花被片6-8，1轮，黄绿色，大小近相同；雄花具5-8雄蕊；雌花具(2)3(4)心皮
  果: 果紫红色，果瓣径4-5毫米，散生凸起油腺点，顶端具甚短芒尖或无
生态习性:
  产地: 北起东北南部，南至五岭北坡，东南至江苏、浙江沿海地带，西南至西藏东南部
  生境: 坡地，也有栽种
  海拔: 2500m
  物候: 花期4-5月，果期8-9月
  栽培: 喜温暖气候，喜光，稍耐荫、耐热、耐旱，不耐水涝；喜疏松肥沃的砂质壤土。萌芽力强，耐修剪；生长缓慢。
功用价值:
  经济价值: 重要的香辛料。
  植物文化: 欣忻笑口向西风，喷出元珠颗颗同； 采处倒含秋露白，晒时娇映夕阳红； 调浆美著骚经上，涂壁香凝汉殿中； 鼎餗也应知此味，莫教姜桂独成功； ——宋 刘子翚《花椒》
植物志: '33. 花椒（通称）　椒（诗经），檓、大椒（尔雅），秦椒、蜀椒（本草经）

  Zanthoxylum bungeanum Maxim. in Bull. Acad. Sci. St.-Petersb. 16: 212. 1871 et in Mel. Biol. 8: 2. 1871, pro parte, exclud. syn. Z. simulans Hance; Huang in Acta Phytotax. Sin. 6: 21. Pl. 2. 1957. ——Zanthoxylum bungei Pl. et Linden ex Hance in Journ. Bot. 13: 131. 1875; Franch. in Nouv. Arch Mus. Paris ser. 2: 218. 1883; Hemsl. in Journ. Linn. Soc. Bot. 23: 106. 1886, pro parte; Kom. in Acta Hort. Petrop. 22: 667. 1904; Rehd. et Wils. in Sarg. Pl. Wils. 2: 121. 1914, pro parte; Engl. Nat. Pflanzenfam. 3(4): 115. 1896 et 19a: 217. 1931, exclud. syn. Z. simulans Hance ——Z. bungei var. imperforatum Franch. in Mem. Sci. Nat. Cherbourg. 24: 205. 1884. ——Z. fraxinoides Hemsl. in Ann. Bot. 9:148. 1895. ——Z. simulans var. imperforatum (Franch) Reeder et Chao in Journ. Arn. Arb. 32: 70. 1951, exclud. syn. ——Z. nitidum auct. non DC.: Bunge in Mem. Div. Sav. Acad. Sci. St.-Petersb. 9: 470. 1859. ——Z. piperitum auct. non DC.: Daniell et Benn. in Ann. Nat. Hist. ser. 3. 10: 195. 1862. ——Z. usitatum auct. non Pierre ex Lannes.: Diels in Not. Roy. Bot. Gard. Edinb. 6:97. 1912, nom. nud.

  高3-7米的落叶小乔木；茎干上的刺常早落，枝有短刺，小枝上的刺基部宽而扁且劲直的长三角形，当年生枝被短柔毛。叶有小叶5-13片，叶轴常有甚狭窄的叶翼；小叶对生，无柄，卵形，椭圆形，稀披针形，位于叶轴顶部的较大，近基部的有时圆形，长2-7厘米，宽1-3.5厘米，叶缘有细裂齿，齿缝有油点。其余无或散生肉眼可见的油点，叶背基部中脉两侧有丛毛或小叶两面均被柔毛，中脉在叶面微凹陷，叶背干后常有红褐色斑纹。花序顶生或生于侧枝之顶，花序轴及花梗密被短柔毛或无毛；花被片6-8片，黄绿色，形状及大小大致相同；雄花的雄蕊5枚或多至8枚；退化雌蕊顶端叉状浅裂；雌花很少有发育雄蕊，有心皮3或2个，间有4个，花柱斜向背弯。果紫红色，单个分果瓣径4-5毫米，散生微凸起的油点，顶端有甚短的芒尖或无；种子长3.5-4.5毫米。花期4-5月，果期8-9月或10月。

  产地北起东北南部，南至五岭北坡，东南至江苏、浙江沿海地带，西南至西藏东南部；台湾、海南及广东不产。见于平原至海拔较高的山地，在青海，见于海拔2500米的坡地，也有栽种。耐旱，喜阳光，各地多栽种。

  33a. 花椒（原变种）　图版10: 4

  var. bungeanum

  小叶背面中脉的基部两侧有丛毛外其余无毛，又小叶除叶缘有油点外其余无油点。

  模式标本采自北京市郊。

  产云南西北部的，常见在雌花上有发育的雄蕊，它的花被片的大小有时相差很大。产陕西、甘肃二省南部及四川西部及西北部的，其小叶的边缘有较大的锯齿状裂齿，果梗较纤细且长，分果瓣较小，但色泽鲜红，紫红或洋红色，产其他地区的，其果梗一般较粗而短，分果瓣干后多呈暗红褐色。

  生于南方的花椒，花期较早，约在3月中旬，故果期也较早。但果皮所含油分不如北方的多。青海、宁夏、甘肃、陕西和四川产的最优，辽宁、河北、山东．河南、山西等省产的也属优良。市场上的花椒因产区及采收季节而不同，商品名称也多。西北部分地区和西南产的通称川椒，或称川红椒，亦称大红袍。果皮色红润，油点大，凸起，香气浓，味香而麻辣，无籽，质脆，内果皮淡黄白色，品质最优。至于果皮色淡红，粒小，闭口（尚未开裂去种子的），其味不纯，属次品。又7-8月采收的称“伏椒”，9-10月采收称“秋椒”，前者比后者质优。市场上有将竹叶花椒、野花椒、青花椒三者或其中之一、二充作花椒的。三者民间也有将之作花椒用，但风味均较淡，或微带苦味。青花椒干后暗苍绿或淡黄绿色，风味最差。

  花椒的木材为典型的淡黄色，露于空气中颜色稍变深黄，心边材区别不明显，木质部结构密致，均匀，纵切面有绢质光泽，大材有美术工艺价值。

  花椒用作中药，有温中行气、逐寒、止痛、杀虫等功效。治胃腹冷痛、呕吐、泄泻、血吸虫、蛔虫等症。又作表皮麻醉剂。

  李时珍《本草纲月》中提及的“椒目”即是花椒的种子，“黄壳”指花椒的内果皮，“椒红”或“红”是指花椒的外果皮。

  花椒一名，最早有文字记载是在《诗经》里。《诗经》是收载西周时期的民间诗歌，说明中国人民于二千多至三千年前已经利用花椒了。古代人认为花椒的香气可辟邪，有些朝代的宫廷，用花椒渗入涂料以糊墙壁，这种房子称为“椒房’，是给宫女住的。后来就以椒房比喻宫女后妃《曹操文集》“假为献策收伏后”篇及《红楼梦》第十六回中有“每月逢二、六日期，准椒房眷层入宫请候”之句足以佐证。

  花椒树，结果多，《诗经》有“椒蓼之实，繁衍盈升”之句。花椒又是一种芳香防腐剂，据发掘的汉墓中常有以花椒的果填垫内棺的，很可能是利用它的高效防虫防腐作用，同时，也带有“繁衍盈升”，多子多孙的封建迷信思想，在河北省满城县发掘的汉代中山王刘胜墓（公元前113年）的出土文物中有保存良好的花椒。

  花椒果皮含精油 0.2%-0.4%,不少于15类，主要有linalool、eucalyptol(=cineol)、 limonene等，油的理化性质与野花椒Zanthoxylum simulans Hance的近似，属于干性油，气香而味辛辣，可作食用调料或工业用油。根皮含生物碱：II-methosychelerythrine、N-desmethyl-chelerythrine、 Xanthobungeamine、Skimmia-nine、 Arnottianamide、l-n-acetylannonanine、 β-sitosterol等。

  33b. 油叶花椒（变种）

  var. punctatum Huang in Acta Phytotax. Sin. 16: 81. 1978.

  小叶有肉眼可见的油点，油点干后稍凸起，叶轴、果序及分果瓣干后红棕色。果期7-8月。

  四川西部（天全、峨山等地）。见于海拔2000-2500米的山地疏林中。

  模式标本采自四川峨山。

  33c. 毛叶花椒（变种）

  var. pubescens Huang in Acta Phytotax. Sin. 6: 24. 1957.

  新生嫩枝、叶轴及花序轴、小叶片两而均被柔毛，有时果梗及小叶腹面无毛。本变种分为二类，一类的小叶薄纸质，干后两而颜色明显不同，叶背淡灰白色，果梗纤细而延长；另一类的小叶厚纸质，叶面及果梗无毛，侧脉在叶面凹陷呈细裂沟状，小叶两面近于同色，干后红棕色，果梗较粗。花期5-6月，果期10-11月。

  产青海（循化）、甘肃、陕西南部、四川西部及西北部（理县、黑水、茂县、宝兴等县）。见于海拔2500-3200米山地。

  模式标本采自四川宝兴。

