学名: Trigonotis peduncularis (Trevis.) Benth. ex Baker & S. Moore
中文名: 附地菜
俗名:
- 地胡椒
- 黄瓜香
异名:
- Trigonotis clavata
- Myosotis chinensis
- Myosotis peduncularis
- Eritrichium pedunculare
- Eritrichium japonicum
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Boraginales-紫草目(zǐ cǎo mù)
  科: Boraginaceae-紫草科(zǐ cǎo kē)
  属: Trigonotis-附地菜属(fù dì cài shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 二年生草本
  株: 高达30厘米
  茎: 茎常多条，直立或斜升，下部分枝，密被短糙伏毛
  叶: 基生叶卵状椭圆形或匙形，长2-3厘米，宽0.5-1厘米，先端钝圆，基部渐窄成叶柄，两面被糙伏毛，具柄；茎生叶长圆形或椭圆形，具短柄或无柄
  花: 花序顶生，果期长10-20厘米；无苞片或花序基部具2-3苞片；花梗长3-5毫米；花萼裂至中下部，长2-2.5毫米，裂片卵形，先端渐尖或尖；花冠淡蓝或淡紫红色，冠筒极短，冠檐径约2毫米，裂片倒卵形，开展，喉部附属物白或带黄色；花药卵圆形，长约0.3毫米
  果: 小坚果斜三棱锥状四面体形，长约1毫米，被毛，稀无毛，背面三角状卵形，具锐棱，腹面2側面近等大，基底面稍小，着生面具短柄
生态习性:
  物候: 花果期4-7月
功用价值: 暂无数据
植物志: '产西藏、云南、广西北部、四川、贵州、贵州、江西、安徽、湖南、湖北、广东、福建至新疆、甘肃、内蒙古、山西、河北、北京、辽宁、吉林、黑龙江等省区。生平原、丘陵草地、林缘、田间及荒地。欧洲东部、亚洲温带的其他地区也有分布。

  全草入药，能温中健胃，消肿止痛，止血。嫩叶可供食用。花美观可用以点缀花园。'
