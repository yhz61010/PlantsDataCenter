学名: Malus halliana Koehne
中文名: 垂丝海棠
俗名: 无
异名:
- Pyrus halliana
- Malus floribunda var. parkmanni
- Malus domestica var. halliana
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Malus-苹果属(píng guǒ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 乔木
  株: 高达5米
  枝: 小枝微弯曲，初有毛，旋脱落；冬芽卵圆形，无毛或仅鳞片边缘有柔毛
  叶: 叶卵形、椭圆形至长椭圆状卵形，长3.5-8厘米，先端长渐尖，基部楔形至近圆形，边缘有圆钝细锯齿，沿脉有时被短柔毛，上面有光泽，常带紫晕；叶柄长0.5-2.5厘米，幼时被疏柔毛，老时无毛，托叶披针形，早落
  花: 花4-6，组成伞房花序；花梗细弱，下垂，长2-4厘米，紫色，有稀疏柔毛；花径3-3.5厘米；被丝托外面无毛，萼片三角状卵形，长3-5毫米，先端钝，全缘，外面无毛，内面密被绒毛，与被丝托等长或稍短，花瓣常5数以上，粉红色，倒卵形，长约1.5厘米，基部有短爪；雄蕊20-25，约等于花瓣1/2；花柱4或5，基部有长绒毛；顶花有时无雌蕊
  果: 果梨形或倒卵圆形，径6-8毫米，稍带紫色，萼片脱落；果柄长2-5厘米，花期3-4月，果期9-10月
生态习性:
  产地: 江苏、浙江、安徽、陕西、四川、云南
  生境: 山坡丛林中或山溪边
  海拔: 50-1200m
  物候: 花期3-4月，果期9-10月
功用价值:
  经济价值: 嫩枝、嫩叶均带紫红色，花粉红色，下垂，早春期间甚为美丽，各地常见栽培供观赏用，有重瓣、白花等变种
  植物文化: 春工叶叶与丝丝，怕日嫌风不自持； 晓镜为谁妆未办，沁痕犹有泪臙脂； ——宋 范成大《垂丝海棠》
植物志: '产江苏、浙江、安徽、陕西、四川、云南。生山坡丛林中或山溪边，海拔50-1200米。

  落叶小乔木，嫩枝、嫩叶均带紫红色，花粉红色，下垂，早春期间甚为美丽，各地常见栽培供观赏用，有重瓣、白花等变种。

  本种近似湖北海棠 M. hupehensis (Pamp.) Rebel. 和山荆子 M. baccata (L.) Borkh., 但和湖北海棠的区别，在叶边上具有圆钝细锯齿，萼片先端圆钝和较小的果实；和山荆子的区别在叶片带紫绿色，叶边有圆钝锯齿，花瓣粉红色，萼片先端圆钝，比萼筒稍短。'
