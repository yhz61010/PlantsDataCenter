学名: Spiraea japonica L. f.
中文名: 粉花绣线菊
俗名:
- 吹火筒
- 狭叶绣球菊
- 尖叶绣球菊
- 火烧尖
- 蚂蟥梢(mǎ huáng shāo)
- 日本绣线菊
异名:
- Spiraea callosa
- Spiraea × bumalda
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Spiraea-绣线菊属(xiù xiàn jú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 直立灌木
  株: 高达1.5米
  枝: 小枝无毛或幼时被短柔毛
  叶: 叶卵形或卵状椭圆形，长2-8厘米，先端急尖或短渐尖，基部楔形，具缺刻状重锯齿或单锯齿，上面无毛或沿叶脉微具短柔毛，下面常沿叶脉有柔毛；叶柄长1-3毫米，被短柔毛
  花: 复伞房花序生于当年生直立新枝顶端，密被短柔毛；花梗长4-6毫米；苞片披针形或线状披针形，下面微被柔毛；花径4-7毫米：花萼有疏柔毛，萼片三角形；花瓣卵形或圆形，长2.5-3.5毫米，粉红色；雄蕊25-30，远长于花瓣；花盘环形，约有10个不整齐裂片
  果: 蓇葖果半开张，无毛或沿腹缝有疏柔毛，宿存花柱顶生，稍倾斜开展，宿存萼片常直立
生态习性:
  物候: 花期6-7月，果期8-9月
功用价值: 暂无数据
植物志: '原产日本、朝鲜，我国各地栽培供观赏。

  本种变异性强，产于我国的还有下列6变种。

  粉花绣线菊渐尖叶变种　狭叶绣线菊（中国树木分类学）

  粉花绣线菊裂叶变种

  粉花绣线菊椭圆叶变种　卵叶绣线菊（中国树木分类学）

  粉花绣线菊光叶变种　大绣线菊（中国树木分类学），绣线菊（江苏南部种子植物手册）

  粉花绣线菊无毛变种　红绣线菊（中国树木分类学）'
