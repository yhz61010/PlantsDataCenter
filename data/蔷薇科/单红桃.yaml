学名: Prunus persica 'Danhong'
中文名: 单红桃
俗名:
- ‘单红’桃
异名:
- Amygdalus persica cv. Danhong
描述: 乔木。叶的边缘有细齿，暗绿色有光泽。花单瓣，红色。果实近球形，表面有茸毛，肉质可食。
