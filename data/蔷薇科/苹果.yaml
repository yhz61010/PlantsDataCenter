备注: '辽宁、河北、山西、山东、陕西、甘肃、四川、云南、西藏常见栽培。适生于山坡梯田、平原矿野以及黄土丘陵等处，海拔50-2500米。原产欧洲及亚洲中部，栽培历史已久，全世界温带地区均有种植。

  本种是著名落叶果树，经济价值很高。全世界栽培品种总数在一千以上。我国现在栽培的重要品种有自欧美直接输入者，也有自日本转来者，也有自己培育成的新品种。早期栽培的中国苹果品种有片红、彩苹、白檎等，属于早熟种，不耐储藏，经久质变，俗称绵苹果。河北、山西、陕西、甘肃等地有小量生产。近期传入中国的苹果，俗称西洋苹果，系在1870年开始引入烟台，以后在青岛、威海卫以及辽宁、河北等地陆续栽培。现在我国苹果的生产以辽宁的熊岳、大连、金县，河北的昌黎、秦皇岛，山东的烟台、龙口、青岛等地为重点产区。早熟品种有黄魁、红魁、金花、早生赤，中熟品种有祝、旭、金冠、优花皮，晚熟品种有红玉、国光、白龙、元帅、香蕉等。河北出产的香果或名虎拉车可能为本种与花红的杂交种。'
