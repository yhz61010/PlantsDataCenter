学名: Malus domestica Borkh.
中文名: 苹果
俗名:
- 西洋苹果
- 柰
异名:
- Malus pumila
- Pyrus malus
- Malus dasyphylla
- Malus communis
- Malus niedzwetzkyana
- Malus sylvestris subsp. mitis
- Pyrus malus var. pumila
- Malus silvestris subsp. mitis
- Malus dasyphylla var. domestica
- Malus domestica subsp. pumila
- Malus pumila var. domestica
- Malus pumila var. niedzwetzkyana
描述: 落叶乔木，高可达15米。小枝圆柱形。叶互生，椭圆形至卵形，边缘具圆钝锯齿。伞房花序，花白色或带粉红色。梨果扁球形，萼洼下陷。花期4–5月，果期7–10月。我国各地广泛栽培。为世界著名水果，品种繁多，果肉甜美，可鲜食、加工，也是重要观赏与蜜源树种。
