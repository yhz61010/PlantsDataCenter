备注: '小乔木，高3-5米；小枝紫褐色或暗褐色；小枝、叶片及花梗幼时皆有短柔毛，后脱落。伞形总状花序有花4-7朵，生于小枝顶端，花梗长2-3厘米；萼筒外面密生白色柔毛，萼裂片披针形，内外均密生柔毛；花粉红色，直径约4厘米；雄蕊约20；花柱5。梨果近球形，幼时疏生白色短柔毛，以后脱落无毛，直径1-1.5厘米，红色，基部柄洼下陷，萼裂片多数脱落，少数宿存。

  本种与海棠花 M. spectabilis (Ait.) Borkh. 极近似，其区别在叶片形状较狭长，基部楔形，叶边锯齿稍锐，叶柄细长，果实基部下陷。据 A. Rehder 推断，本种是由山荆子和海棠花杂交而成 ( M. baccata × M. spectabilis )。此外有些种类，果形较大，果梗细长，萼片无毛，部分宿存或脱落，另名为 M. robusta (Carr.) Rehd., 并推断为山荆子与楸子杂交而成 ( M. baccata × M. prunifolia )。这些种类来源于天然或人工杂交，形态变异很大，不易区分，在我国果品名称中，海棠的品种极为复杂，尚待研究统一。在植物分类中，暂以西府海棠 M. micromalus Makino 一名概括之，不再分列为多种，以免引起混乱。'
