学名: Malus × micromalus Makino
中文名: 西府海棠
俗名:
- 子母海棠
- 小果海棠
- 海红
异名:
- Malus spectabilis var. kaido
- Malus microcapa var. kaido
- Malus spectabilis var. micromalus
- Malus demostica var. micromalus
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Malus-苹果属(píng guǒ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 小乔木
  株: 高达2.5-5米，树枝直立性强
  枝: 冬芽卵形，先端急尖，无毛或仅边缘有绒毛，暗紫色
  叶: 叶片形状较狭长，基部楔形，叶边锯齿稍锐，叶柄细长，果实基部下陷
  花: 伞形总状花序，有花4-7朵，集生于小枝顶端，花梗长2-3厘米，嫩时被长柔毛，逐渐脱落；苞片膜质，线状披针形，早落；花直径约4厘米；萼筒外面密被白色长绒毛；萼片三角卵形，三角披针形至长卵形，先端急尖或渐尖，全缘，长5-8毫米，内面被白色绒毛，外面较稀疏，萼片与萼筒等长或稍长；花瓣近圆形或长椭圆形，长约1.5厘米，基部有短爪，粉红色；雄蕊约20，花丝长短不等，比花瓣稍短；花柱5，基部具绒毛，约与雄蕊等长
  果: 梨果近球形，幼时疏生白色短柔毛，以后脱落无毛，直径1-1.5厘米，红色，基部柄洼下陷，萼裂片多数脱落，少数宿存。
生态习性:
  产地: 辽宁、河北、山西、山东、陕西、甘肃、云南
  海拔: 100-2400m
  物候: 花期4-5月，果期8-9月
功用价值:
  经济价值: 常见栽培的果树及观赏树；树姿直立，花朵密集；果味酸甜，可供鲜食及加工用；栽培品种很多，果实形状、大小、颜色和成熟期均有差别；华北有些地区用作苹果或花红的砧木，生长良好，比山荆子抗旱力强
  植物文化: 东风袅袅泛崇光，香雾空蒙月转廊； 只恐夜深花睡去，故烧高烛照红妆； ——宋 苏轼《海棠》
植物志: 为常见栽培的果树及观赏树。树姿直立，花朵密集。果味酸甜，可供鲜食及加工用。栽培品种很多，果实形状、大小、颜色和成熟期均有差别，所以有热花红、冷花红、铁花红、紫海棠、红海棠、老海红、八楞海棠等名称。华北有些地区用作苹果或花红的砧木，生长良好，比山荆子抗旱力强。
元数据:
  来源文件: QW-蔷薇科.xlsx
