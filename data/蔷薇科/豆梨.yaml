- 梨丁子
- 杜梨（贵州土名）
- 糖梨
- 赤梨
- 阳檖
- 鹿梨
异名:
- Pyrus calleryana var. calleryana f. tomentella
- Pyrus kawakamii
- Pyrus taiwanensis
