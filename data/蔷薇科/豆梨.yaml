形态特征:
  识别要点: 本变型的特点，在其幼时小枝、叶柄、叶片中脉上下两面和叶片边缘均被锈色绒毛，但不久即全部脱落，果梗和萼筒外面也被稀疏绒毛
  生活型: 乔木
  株: 高达8米
  枝: 幼枝有绒毛，不久脱落；冬芽三角状卵圆形
  叶: 叶宽卵形至卵形，稀长椭圆形，长4-8厘米，先端渐尖，稀短尖，基部圆形至宽楔形，边缘有钝锯齿，两面无毛：叶柄长2-4厘米，无毛，托叶叶质，线状披针形，早落
  花: 花6-12组成伞形总状花序，径4-6厘米；花序梗无毛；苞片膜质，线状披针形，内面有绒毛；花梗长1.5-3厘米；花径2-2.5厘米；被丝托无毛；萼片披针形，全缘，内面有绒毛；花瓣白色，卵形，长约1.3厘米，基部具短爪；雄蕊20，稍短于花瓣；花柱2(-5)，基部无毛
  果: 梨果球形，径约1厘米，黑褐色，有斑点，萼片脱落，2(3)室；果柄细长
生态习性:
  产地: 产山东、河南、江苏、浙江、江西、安徽、湖北、湖南、福建、广东、广西。
  分布: 分布越南北部。
  生境: 适生于温暖潮湿气候，生山坡、平原或山谷杂木林中。
  海拔: 海拔80-1800米。
  物候: 花期4月，果期8-9月
功用价值:
  经济价值: 木材致密可作器具。通常用作沙梨砧木。
植物志: '产山东、河南、江苏、浙江、江西、安徽、湖北、湖南、福建、广东、广西。适生于温暖潮湿气候，生山坡、平原或山谷杂木林中，海拔80-1800米。分布越南北部。

  木材致密可作器具。通常用作沙梨砧木。

  本种与杜梨 P. betulaefolia Bge. 的异点，在于后者小枝密被灰白色绒毛，叶缘具有粗锐锯齿，叶柄、果梗均被绒毛。又本种可与川梨 P. pashia D. Don 比较，后者叶片较窄，花柱3-5，雄蕊25-30，易于区别。'
