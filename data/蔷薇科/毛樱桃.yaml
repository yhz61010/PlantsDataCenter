备注: 本种果实微酸甜，可食及酿酒；种仁含油率达43%左右，可制肥皂及润滑油用。种仁又入药，商品名大李仁，有润肠利水之效。我国河北、新疆、江苏等地城市庭园常见栽培，供观赏用。Koehne 还在《华西植物志略》一书中记载我国西藏产 P. jacquemontii (Edgewoth) Hook f.，主要特点是叶无毛或仅叶片下面有微柔毛，子房完全无毛。我们未见有此标本，留待以后考证。
