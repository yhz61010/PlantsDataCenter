形态特征:
  生活型: 灌木，稀小乔木状
  枝: 嫩枝密被绒毛至无毛；冬芽疏被柔毛或无毛
  叶: 叶卵状椭圆形或倒卵状椭圆形，长2-7厘米，有急尖或粗锐锯齿，上面被疏柔毛，下面灰绿色，密被灰色绒毛至稀疏，侧脉4-7对；叶柄长2-8毫米，被绒毛至稀疏，托叶线形，长3-6毫米，被长柔毛
  花: 花单生或2朵簇生，花叶同放，近先叶开放或先叶开放；花梗长达2.5毫米或近无梗；萼筒管状或杯状，长4-5毫米，外被柔毛或无毛，萼片三角状卵形，长2-3毫米，内外被柔毛或无毛；花瓣白或粉红色，倒卵形：雄蕊短于花瓣；花柱伸出与雄蕊近等长或稍长；子房被毛或仅顶端或基部被毛
  果: 核果近球形，熟时红色，径0.5-1.2厘米；核棱脊两侧有纵沟
生态习性:
  产地: 黑龙江、吉林、辽宁、内蒙古、河北、山西、陕西、甘肃、宁夏、青海、山东、四川、云南、西藏
  生境: 山坡林中、林缘、灌丛中或草地
  海拔: 100-3200m
  物候: 花期4-5月，果期6-9月
