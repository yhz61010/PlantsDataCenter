学名: Rosa xanthina Lindl.
中文名: 黄刺玫
俗名:
- 黄刺莓
- 黄刺梅
异名:
- Rosa xanthinoides
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Rosa-蔷薇属(qiáng wēi shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 灌木
  株: 高2-3米
  枝: 枝密集，披散;小枝无毛，有散生皮刺，无针刺
  叶: 小叶7-13，连叶柄长3-5厘米；小叶宽卵形或近圆形，稀椭圆形，长0.8-2厘米，先端圆钝，基部宽楔形或近圆，有圆钝锯齿，上面无毛，下面幼时被稀疏柔毛，渐脱落；叶轴和叶柄有稀疏柔毛和小皮刺；托叶带状披针形，大部贴生叶柄，离生部分耳状，边缘有锯齿的腺
  花: 花单生叶腋，重瓣或半重瓣，黄色，径3-4(5)厘米，无苞片；花梗长1-1.5厘米；花萼外面无毛；萼片披针形，全缘，内面有稀疏柔毛：花瓣宽倒卵形，先端微凹；花柱离生，被长柔毛，微伸出萼筒
  果: 蔷薇果近球形或倒卵圆形，熟时紫褐或黑褐色，径0.8-1厘米，无毛；萼片反折
生态习性:
  产地: 东北、华北各地庭园习见栽培
  物候: 花期4-6月，果期7-8月
功用价值:
  经济价值: 早春繁花满枝，颇为美观
  植物文化: 和烟和露一丛花，担入宫城许史家
植物志: 暂无数据
