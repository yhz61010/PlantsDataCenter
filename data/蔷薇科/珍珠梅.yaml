学名: Sorbaria sorbifolia (L.) A. Braun
中文名: 珍珠梅
俗名:
- 东北珍珠梅
- 华楸珍珠梅
- 八本条
- 高楷子
- 山高梁条子
异名:
- Spiraea sorbifolia
- Sorbaria sorbifolia var. typica
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Sorbaria-珍珠梅属(zhēn zhū méi shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 灌木
  株: 高达2米
  枝: 小枝无毛或微被短柔毛
  叶: 羽状复叶，小叶11-17，连叶柄长13-23厘米，叶轴微被短柔毛；小叶披针形或卵状披针形，长5-7厘米，先端渐尖，稀尾尖，基部近圆或宽楔形，稀偏斜，有尖锐重锯齿，两面无毛或近无毛，侧脉12-16对；小叶无柄或近无柄，托叶卵状披针形或三角披针形，有不规则锯齿或全缘，长0.8-1.3厘米，外面微被短柔毛
  花: 顶生密集圆锥花序，分枝近直立，长10-20厘米，花序梗和花梗被星状毛或短柔毛，果期近无毛；苞片卵状披针形或线状披针形，长0.5-1厘米，全缘或有浅齿，上下两面微被柔毛，果期渐脱落；花梗长5-8毫米；花径1-1.2厘米；被丝托钟状，外面基部微被短柔毛；萼片三角卵形；花瓣长圆形或倒卵形，长5-7毫米，白色；雄蕊40-50，约长于花瓣1.5-2倍；心皮5，无毛或稍具柔毛
  果: 蓇葖果长圆形，弯曲花柱长约3毫米，果柄直立；萼片宿存，反折，稀开展
生态习性:
  物候: 花期7-8月，果期9月
