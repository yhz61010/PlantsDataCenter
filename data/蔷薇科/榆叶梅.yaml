学名: Prunus triloba Lindl.
中文名: 榆叶梅
俗名:
- 额勒伯特-其其格 (é lè bó tè qí qí gé)
- 小桃红
异名:
- Amygdalus triloba
- Prunus triloba var. plena
- Prunus triloba var. truncata
- Amygdalus ulmifolia
- Cerasus triloba
- Cerasus triloba var. plena
- Cerasus triloba var. truncata
- Amygdalus triloba var. plena
- Amygdalus triloba var. truncata
描述: 落叶小乔木，多呈灌木状；树皮紫褐色；叶具粗重锯齿；花单生，粉红色；花期3～4月，果期6～7月。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Prunus-李属(lǐ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 灌木，稀小乔木
  株: 高2-3米
  枝: 小枝无毛或幼时微被柔毛；短枝叶常族生，一年生枝叶互生叶宽椭圆形或倒卵形，长2-6厘米，先端短渐尖，常3裂，基部宽楔形，上面具疏柔毛或无毛，下面被柔毛，具粗锯齿或重锯齿；叶柄长0.5-1厘米，被柔毛
  叶: 短枝叶常族生，一年生枝叶互生叶宽椭圆形或倒卵形，长2-6厘米，先端短渐尖，常3裂，基部宽楔形，上面具疏柔毛或无毛，下面被柔毛，具粗锯齿或重锯齿；叶柄长0.5-1厘米，被柔毛
  花: 花1-2朵，先叶开放，径2-3厘米；花梗长4-8毫米；萼筒宽钟形，长3-5毫米，无毛或幼时微具毛，萼片卵形或卵状披针形，无毛，近先端疏生小齿；花瓣近圆形或宽倒卵形，长0.6-1厘米，粉红色
  果: 核果近球形，径1-1.8厘米，顶端具小尖头，熟时红色，被柔毛；果柄长0.5-1厘米；果肉薄，熟时开裂；核近球形，具厚硬壳，径1-1.6厘米，两侧几不扁，顶端钝圆，具不整齐网纹
生态习性:
  产地: 黑龙江、吉林、辽宁、内蒙古、河北、山西、陕西、甘肃、山东、江西、江苏、浙江等省区；目前全国各地多数公园内均有栽植
  分布: 中亚地区
  生境: 坡地或沟旁乔、灌木林下或林缘
  海拔: 生于低至中海拔
  物候: 花期4-5月，果期5-7月
功用价值:
  经济价值: 本种开花早，主要供观赏，常见栽培类型如下：1. 重瓣榆叶梅 ；2. 鸾枝
  植物文化: '僦居喜近慈仁寺 ，移得鸾枝隔岁栽；

    ——清 查慎行 《是夕再饮严矱庵侍御鸾枝花下》'
植物志: 本种开花早，主要供观赏，常见栽培类型如下：1. 重瓣榆叶梅 f. multiplex (Bge.) Rehd.（f. plena Dipp.）花重瓣，粉红色；萼片通常10枚。2. 鸾枝（群芳谱），俗称兰枝 var. petzoldii (K. Koch) Bailey 花瓣与萼片各10枚，花粉红色；叶片下面无毛。
