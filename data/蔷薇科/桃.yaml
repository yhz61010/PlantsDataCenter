  物候: 花期3-4月，果成熟期因品种而异，常8-9月
功用价值:
  经济价值: 供食用、药用及工业原料
植物志: '7a. 桃（原变种）

  Amygdalus persica L. var. persica

  乔木，高3-8米；树冠宽广而平展；树皮暗红褐色，老时粗糙呈鳞片状；小枝细长，无毛，有光泽，绿色，向阳处转变成红色，具大量小皮孔；冬芽圆锥形，顶端钝，外被短柔毛，常2-3个簇生，中间为叶芽，两侧为花芽。叶片长圆披针形、椭圆披针形或倒卵状披针形，长7-15厘米，宽2-3.5厘米，先端渐尖，基部宽楔形，上面无毛，下面在脉腋间具少数短柔毛或无毛，叶边具细锯齿或粗锯齿，齿端具腺体或无腺体；叶柄粗壮，长1-2厘米，常具1至数枚腺体，有时无腺体。花单生，先于叶开放，直径2.5-3.5厘米；花梗极短或几无梗；萼筒钟形，被短柔毛，稀几无毛，绿色而具红色斑点；萼片卵形至长圆形，顶端圆钝，外被短柔毛；花瓣长圆状椭圆形至宽倒卵形，粉红色，罕为白色；雄蕊约20-30，花药绯红色；花柱几与雄蕊等长或稍短；子房被短柔毛。果实形状和大小均有变异，卵形、宽椭圆形或扁圆形，直径(3)5-7(12)厘米，长几与宽相等，色泽变化由淡绿白色至橙黄色，常在向阳面具红晕，外面密被短柔毛，稀无毛，腹缝明显，果梗短而深入果洼；果肉白色、浅绿白色、黄色、橙黄色或红色，多汁有香味，甜或酸甜；核大，离核或粘核，椭圆形或近圆形，两侧扁平，顶端渐尖，表面具纵、横沟纹和孔穴；种仁味苦，稀味甜。花期3-4月，果实成熟期因品种而异，通常为8-9月。2n=16。

  原产我国，各省区广泛栽培。世界各地均有栽植。

  桃树干上分泌的胶质，俗称桃胶，可用作粘接剂等，为一种聚糖类物质，水解能生成阿拉伯糖、半乳糖、木糖、鼠李糖、葡糖醛酸等，可食用，也供药用，有破血、和血、益气之效。

  桃的食用类群有离核和粘核之分，简述如下。

  桃久经栽培，在食用类群中已培育出很多优良品种，根据果实和结果习性等征状，我国桃的品种可划分为五个品种群，简述如下。

  1. 北方桃品种群 果实顶端尖而突起，缝合线较深；树形较直；中、短果枝比例较大。耐旱抗寒，从5-12月陆续采收。主要分布于华北、西北和华中一带。

  2. 南方桃品种群 果实顶端圆钝，果肉柔软多汁；树冠开展；通常长枝结果；花芽多为复芽。抗旱及耐寒力较北方品种群稍弱。主要分布于华东、西南和华南等地。

  3．黄肉桃品种群 果皮和果肉均金黄色，肉质较紧密强韧，适于加工和制罐头。我国西北、西南地区栽培较多，华北和华东较少。

  4. 蟠桃品种群 果实扁平形，两端凹入；树冠开展，枝条短密；花多，丰产。江苏和浙江栽培最多，华北和西北较少。

  5. 油桃品种群 果实外面无毛。产于西北各省区，尤以新疆、甘肃栽植较多。

  桃的观赏树种很多，现将常见者简述如下：1. 碧桃（群芳谱） f. duplex Rehd. 花重瓣，淡红色。2. 绯桃（群芳谱） f. magnifica Schneid. 花重瓣，鲜红色。3. 红花碧桃 f. rubroplena Schneid. 花半重瓣，红色。4. 绛桃（群芳谱） f. camelliaeflora (Van Houtte) Dipp. 花半重瓣，深红色。5．千瓣红桃（群芳谱） f. dianthiflora (Van Houtte) Dipp. 花半重瓣，淡红色。6. 单瓣白桃（群芳谱） f. alba (Lindl.) Schneid.花单瓣，白色。7. 千瓣白桃（群芳谱） f. albo-plena Schneid. 花半重瓣，白色。8. 撒金碧桃 f. versicolor (Sieb.) Voss 花半重瓣，白色，有时一枝上之花兼有红色和白色，或白花而有红色条纹。9. 紫叶桃花 f. atropurpurea Schneid. 叶紫色。10. 垂枝碧桃 f. pendula Dipp. 枝下垂。11. 塔型碧桃 f. pyramidalis Dipp. 树形窄塔形或窄圆锥形。12. 寿星桃（汝南圃史）var. densa Makino 树形矮，花重瓣。可供观赏及作矮化砧木。

