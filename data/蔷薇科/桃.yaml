形态特征:
  生活型: 乔木
  株: 高达8米
  枝: 小枝无毛；冬芽被柔毛
  叶: 叶披针形，先端渐尖，基部宽楔形，具锯齿
  花: 花单生，先叶开放，径2.5-3.5厘米；花梗极短或几无梗；萼筒钟形，被柔毛，稀几无毛，萼片卵形或长圆形，被柔毛；花瓣长圆状椭圆形或宽倒卵形，粉红色，稀白色：花药绯红色
  果: 核果卵圆形，成熟时向阳面具红晕；果肉多色，多汁有香味，甜或酸甜
