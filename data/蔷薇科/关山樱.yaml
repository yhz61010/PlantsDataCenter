学名: Prunus serrulata var. lannesiana 'Sekiyama'
中文名: 关山樱
俗名:
- '-'
异名:
- Cerasus serrulata cv. Sekiyama
描述: 俗称“红缨”。八重樱的一个代表性品种，在中国广泛栽种，小乔木，平均高度2.5m，多分枝，小枝多而向上弯。花叶同开，开花数量多，花浓红色，花茎6厘米左右，瓣约30枚，2枚雌蕊叶化，不结实，花梗粗且长，嫩叶茶褐色。花期3月底或4月初，秋叶橙黄可比银杏，非常美丽。孤植、群植均可，也可作为行道树栽植。
