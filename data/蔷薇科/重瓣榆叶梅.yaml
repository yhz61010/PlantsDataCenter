学名: Prunus triloba 'Multiplex'
中文名: 重瓣榆叶梅
俗名:
- 小桃红
异名:
- Amygdalus triloba f. multiplex
- Amygdalus triloba cv. Duplex
描述: '2. 叶片如榆树的叶子，所以叫“榆叶梅”。叶片表面粗糙、叶脉凹陷，具有明显的褶皱感。

  叶缘为较粗的锯齿或重锯齿；部分叶片顶端有不明显的浅裂趋势。'
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Prunus-李属(lǐ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  识别要点: 花重瓣，粉红色；萼片通常10枚。
  生活型: 灌木稀小乔木，高2-3米
  枝: 枝条开展，具多数短小枝；小枝灰色，一年生枝灰褐色，无毛或幼时微被短柔毛；冬芽短小，长2-3毫米。
  叶: 短枝上的叶常簇生，一年生枝上的叶互生；叶片宽椭圆形至倒卵形，长2-6厘米，宽1.5-3(4)厘米，先端短渐尖，常3裂，基部宽楔形，上面具疏柔毛或无毛，下面被短柔毛，叶边具粗锯齿或重锯齿；叶柄长5-10毫米，被短柔毛。
  花: 花1-2朵，先于叶开放，直径2-3厘米；花梗长4-8毫米；萼筒宽钟形，长3-5毫米，无毛或幼时微具毛；萼片10枚，卵形或卵状披针形，无毛，近先端疏生小锯齿；花重瓣或半重瓣，花瓣近圆形或宽倒卵形，长6-10毫米，先端圆钝，有时微凹，粉红色；雄蕊约25-30，短于花瓣；子房密被短柔毛，花柱稍长于雄蕊。
  果: 果实近球形，直径1-1.8厘米，顶端具短小尖头，红色，外被短柔毛；果梗长5-10毫米；果肉薄，成熟时开裂；核近球形，具厚硬壳，直径1-1.6厘米，两侧几不压扁，顶端圆钝，表面具不整齐的网纹。
生态习性:
  物候: 花期4-5月，果期5-7月。
功用价值:
  经济价值: 花大美丽，花重瓣，常栽培做观赏
  植物文化: 杨朔 《京城漫记》：“碧桃，樱花，丁香，木槿，榆叶梅……都长得旺的很；”
植物志: 暂无数据
