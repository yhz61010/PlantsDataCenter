学名: Prunus armeniaca L.
中文名: 杏
俗名:
- 杏树(xìng shù)
- 杏花(xìng huā)
- 归勒斯(guī lè sī)
异名:
- Prunus tiliifolia
- Armeniaca vulgaris
描述: 落叶乔木，高达15 m；树冠开阔，圆球形或扁球形。小枝红褐色。叶广卵形，长5～10 cm，宽4～8 cm，先端短尖或尾状尖，锯齿圆钝，两面无毛或仅背面有簇毛。花芽2～3个在枝侧集生，每个花芽内一花；花先叶开放，白色至淡粉红色，径约2.5 cm，花梗极短，花萼鲜绛红色。果实近球形，黄色或带红晕，径2.5～3 cm，有细柔毛；果核平滑。花期3～4月；果 6～7月成熟。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Prunus-李属(lǐ shǔ)
物种保护:
  保护等级: 国家二级保护
分类信息: 暂无数据
形态特征:
  生活型: 乔木
  株: 高达8(-12)米
  枝: 小枝无毛
  叶: 叶宽卵形或圆卵形，长5-9厘米，先端尖或短渐尖，基部圆或近心形，有钝圆锯齿，两面无毛或下面脉腋具柔毛;叶柄长2-3.5厘米，无毛，基部常具1-6腺体
  花: 花单生，径2-3厘米，先叶开放；花梗长1-3毫米，被柔毛；花萼紫绿色，萼筒圆筒形，基部被柔毛，萼片卵形或卵状长圆形，花后反折：花瓣圆形或倒卵形，白色带红晕；花柱下部具柔毛
  果: 核果球形，稀倒卵圆形，径约2.5厘米以上，熟时白、黄或黄红色，常具红晕，微被柔毛；果肉多汁，熟时不裂；核卵圆形或椭圆形，两侧扁平，顶端钝圆，基部对称，稀不对称，稍粗糙或平滑，腹棱较钝圆，背棱较直，腹面具龙骨状棱
  种子: 种仁味苦或甜
生态习性:
  产地: 全国各地、多数为栽培、尤以华北、西北和华东地区种植较多、少数地区逸为野生、在新疆伊犁一带野生成纯林或与新疆野苹果林混生
  分布: 世界各地也均有栽培
  海拔: -3000m
  物候: 花期3-4月，果期6-7月
功用价值:
  理化特性: 种仁（杏仁）入药，有止咳祛痰、定喘润肠之效。
  经济价值: 种仁（杏仁）入药，有止咳祛痰、定喘润肠之效
  植物文化: '清明时节雨纷纷，路上行人欲断魂；

    借问酒家何处有？牧童遥指杏花村；

    ——唐 杜牧《清明》'
植物志: '产全国各地，多数为栽培，尤以华北、西北和华东地区种植较多，少数地区逸为野生，在新疆伊犁一带野生成纯林或与新疆野苹果林混生，海拔可达3000米。世界各地也均有栽培。

  种仁（杏仁）入药，有止咳祛痰、定喘润肠之效。'
