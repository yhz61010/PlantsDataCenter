学名: Prunus cerasifera 'Atropurpurea'
中文名: 紫叶李
俗名:
- 红叶李
- 真红叶李
异名: 无
描述: 灌木或小乔木，高可达8米；多分枝，小枝暗红色。叶片椭圆形、卵形或倒卵形，先端急尖，叶紫红色。花1朵，稀2朵；花瓣白色， 核果近球形或椭圆形，红色，微被蜡粉。花期4月，果期8月。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Prunus-李属(lǐ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 灌木或小乔木
  株: 高可达8米
  枝: 多分枝，枝条细长，开展，暗灰色，有时有棘刺；小枝暗红色，无毛；冬芽卵圆形，先端急尖，有数枚覆瓦状排列鳞片，紫红色，有时鳞 片边缘有稀疏缘毛
  叶: 叶片椭圆形、卵形或倒卵形，极稀椭圆状披针形，长(2)3-6厘米，宽2-3(2)厘米，先端急尖，基部楔形或近圆形，边缘有圆钝锯 齿，有时混有重锯齿，紫色；托叶膜质，披针形，先端渐尖，边有带腺细锯齿，早落
  花: 花1朵，稀2朵；花梗长1-2.2厘米；无毛或微被短柔毛；花直径2-2.5厘米；萼筒钟状，萼片长卵形，先端圆钝，边有疏浅锯齿，与萼片近等长，萼筒和萼片外面无毛，萼筒内面有疏生短柔毛；花瓣白色，长圆形或匙形，边缘波状，基部楔形，着生在萼筒边缘；雄蕊25-30，花丝长短不等，紧密地排成不规则2轮，比花瓣稍短；雌蕊1，心皮被长柔毛，柱头盘状，花柱比雄蕊稍长，基部被稀长柔毛
  果: 核果近球形或椭圆形，长宽几相等，直径1-3厘米，黄色、红色或黑色，微被蜡粉，具有浅侧沟，粘核；核椭圆形或卵球形，先端急尖，浅褐带白色，表面平滑或粗糙或有时呈蜂窝状，背缝具沟，腹缝有时扩大具2侧沟
生态习性:
  物候: 花期4月，果期8月
功用价值:
  经济价值: 华北庭园习见观赏树木之一。常年叶片紫色，引人注目。
  植物文化: 李花 ——李商隐 【唐】 李径独来数，愁情相与悬； 自明无月夜，强笑欲风天； 减粉与园箨，分香沾渚莲； 徐妃久已嫁，犹自玉为钿
植物志: 暂无数据
