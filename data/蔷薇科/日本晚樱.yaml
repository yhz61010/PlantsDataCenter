形态特征:
  识别要点: 本变种叶边有渐尖重锯齿，齿端有长芒，花常有香气
  生活型: 乔木，高3-8米。
  茎: 树皮灰褐色或灰黑色。
  枝: 小枝灰白色或淡褐色，无毛。冬芽卵圆形，无毛。
  叶: 叶片卵状椭圆形或倒卵椭圆形，长5-9厘米，宽2.5-5厘米，先端渐尖，基部圆形，边缘有渐尖重锯齿，齿端有长芒，上面深绿色，无毛，下面淡绿色，无毛，有侧脉6-8对；叶柄长1-1.5厘米，无毛，先端有1-3圆形腺体；托叶线形，长5-8毫米，边有腺齿，早落。
  花: 花序伞房总状或近伞形，有花2-3朵，有香味；总苞片褐红色，倒卵长圆形，长约8毫米，宽约4毫米，外面无毛，内面被长柔毛；总梗长5-10毫米，无毛；苞片褐色或淡绿褐色，长5-8毫米，宽2.5-4毫米，边有腺齿；花梗长1.5-2.5厘米，无毛或被极稀疏柔毛；萼筒管状，长5-6毫米，宽2-3毫米，先端扩大，萼片三角披针形，长约5毫米，先端渐尖或急尖；边全缘；花瓣白色、粉红色，倒卵形，先端下凹；雄蕊约38枚；花柱无毛。
生态习性:
  物候: 花期3-5月
功用价值:
  经济价值: 樱花在日本有悠久的栽培历史，园艺品种极多，有日本国花之誉。主要由本种及其变种与其他种类杂交培育而成。按花色分有纯白、粉白、深粉至淡黄色，幼叶有黄绿、红褐至紫红诸色，花瓣有单瓣、半重瓣至重瓣之别。每年四、五月间樱花盛开，繁花似锦，游人如织，万家空巷，为日本人民重大节日之一。
植物志: '本变种叶边有渐尖重锯齿，齿端有长芒，花常有香气。花期3-5月。

  我国各地庭园栽培，引自日本，供观赏用。

  樱花在日本有悠久的栽培历史，园艺品种极多，有日本国花之誉。主要由本种及其变种与其他种类杂交培育而成。按花色分有纯白、粉白、深粉至淡黄色，幼叶有黄绿、红褐至紫红诸色，花瓣有单瓣、半重瓣至重瓣之别。每年四、五月间樱花盛开，繁花似锦，游人如织，万家空巷，为日本人民重大节日之一。'
