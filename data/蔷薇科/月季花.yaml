学名: Rosa chinensis Jacq.
中文名: 月季花
俗名:
- 月月花
- 月月红
- 玫瑰
- 月季
异名:
- Rosa sinica  Rosa nankinensis
描述: 常绿或半常绿灌木，高1–2米。茎具钩状皮刺。奇数羽状复叶，小叶3–5枚，卵形，边缘具锐锯齿。花单生或簇生，花色丰富，重瓣，芳香。蔷薇果球形，熟时红色。花期4–10月，果期9–11月。原产我国，世界各地广泛栽培。为“花中皇后”，著名观赏花卉，可提取香精、入药。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Rosa-蔷薇属(qiáng wēi shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 直立灌木
  枝: 小枝近无毛，有短粗钩状皮刺或无剌
  叶: 小叶3-5，连叶柄长5-11厘米；小叶宽卵形或卵状长圆形，长2.5-6厘米，有锐锯齿，两面近无毛，上面暗绿色，常带光泽，下面颜色较浅，顶生小叶有柄，侧生小叶近无柄，总叶柄较长，有散生皮刺和腺毛，托叶大部贴生叶柄，顶端分离部分耳状，边缘常有腺毛
  花: 花几朵集生，稀单生，径4-5厘米；花梗长2.5-6厘米，近无毛或有腺毛；萼片卵形，先端尾尖，常有羽状裂片，稀全缘，外面无毛，内面密被长柔毛；花瓣重瓣至半重瓣，红、粉红或白色，倒卵形，先端有凹缺；花柱离生，伸出花萼，约与雄蕊等长
  果: 蔷薇果卵圆形或梨形，熟时红色
生态习性:
  产地: 原产中国，各地普遍栽培，园艺品种众多
  物候: 花期4-9月，果期6-11月。
功用价值:
  经济价值: 花、根、叶均入药；花含挥发油、槲皮苷鞣质、没食子酸、色素等，治月经不调、痛经、痛疖肿毒；叶治跌打损伤；鲜花或叶外用，捣烂敷患处
  植物文化: '绿刺含烟郁，红苞逐月开；

    朝华抽曲沼，夕蕊压芳台；

    能斗霜前菊，还迎雪里梅；

    踏歌春岸上，几度醉金杯；

    ——明 刘绘《月季花》'
植物志: '55.月季花 （群芳谱）月月红（江苏浙江），月月花（四川）

  Rosa chinensis Jacq. Obs. Bot. 3: 7. t. 55. 1768; Willmott, Gen. Ros. 1: 79. 1911; Rehd. et Wils. in Sarg. Pl. Wils. 2:320. 1915; Hand.-Mazz. Symb. Sin. 7: 527. 1933; 广州植物志297.图152. 1956; 江苏南部种子植物手册357. 1959; Vidal in Fl. Camb. Laos et Vietn. 6:142. 1968 et in Fl. Thailand 2 (1) .65. 1970; , 中国高等植物图鉴2: 252。图2233. 1972; 秦岭植物志1 (2): 571. 1974; 内蒙古植物志3: 63. 图版31. 图5-6.1977. ——R. sinica L. Syst. Veg. ed. 13. 394. 1774. ——R. nankinensis Lour. Fl. Cochinch. 324. 1790. ——R. indica auct. non L. 1753: Lour. Fl. Cochinch. 323. 1790; Hook. f. Fl. Brit. Ind. 2:364. 1878.

  55a. 月季花（原变种）　图版67: 4-7

  R. chinensis Jacq. var. chinensis

  直立灌木，高1-2米；小枝粗壮，圆柱形，近无毛，有短粗的钩状皮刺或无刺。小叶3-5，稀7，连叶柄长5-11厘米，小叶片宽卵形至卵状长圆形，长2.5-6厘米，宽1-3厘米，先端长渐尖或渐尖，基部近圆形或宽楔形，边缘有锐锯齿，两面近无毛，上面暗绿色，常带光泽，下面颜色较浅，顶生小叶片有柄，侧生小叶片近无柄，总叶柄较长，有散生皮刺和腺毛；托叶大部贴生于叶柄，仅顶端分离部分成耳状，边缘常有腺毛。花几朵集生，稀单生，直径4-5厘米；花梗长2.5-6厘米，近无毛或有腺毛，萼片卵形，先端尾状渐尖，有时呈叶状，边缘常有羽状裂片，稀全缘，外面无毛，内面密被长柔毛；花瓣重瓣至半重瓣，红色、粉红色至白色，倒卵形，先端有凹缺，基部楔形；花柱离生，伸出萼筒口外，约与雄蕊等长。果卵球形或梨形，长1-2厘米，红色，萼片脱落。花期4-9月，果期6-11月。

  原产中国，各地普遍栽培。园艺品种很多。

  花、根、叶均入药。花含挥发油、槲皮苷鞣质、没食子酸、色素等，治月经不调、痛经、痛疖肿毒。叶治跌打损伤。鲜花或叶外用，捣烂敷患处。

  55b. 单瓣月季花（变种）

  R. chinensis Jacq. var. spontanea (Rehd. et Wils.) Yü et Ku, stat. nov. ——R. chinensis Jacq. f. spontanea Rehd. et Wils. in Sarg. Pl. Wils. 2: 320. 1915.

  本变种枝条圆筒状，有宽扁皮刺，小叶片3-5，花瓣红色，单瓣，萼片常全缘，稀具少数裂片。

  产湖北、四川、贵州。此为月季花原始种。

  55c. 紫月季花（变种）

  R. chinensis Jacq. var. semperflorens (Curbs) Koehne, Deuts. Dendr. 281. 1893; Byhouwer in Journ. Arn. Arb. 10: 97. 1929; 秦岭植物志 1(2): 572. 1974. ——R. semperflorens Curtis in Bot. Mag. 8: t. 284. 1794

  本变种枝条纤细，有短皮刺；小叶5-7，较薄，常带紫红色；花大部单生或2-3朵，深红色或深紫色，重瓣，有细长花梗。

  产福建，具体地点不详，钟心煊采6425 是否应属本组，有待研究确定。

  Metcalf 发表福建蔷薇 Rosa fukienensis Metc. in Journ. Arn. Arb. 21: 274. 1940. 直立灌木，具有小叶5片，无毛；花多朵呈伞房状圆锥花序，萼片披针形有羽状裂片，花柱外伸，离生，被柔毛，果实近球形，直径约7毫米，无毛。

