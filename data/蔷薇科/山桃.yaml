- 苦桃
- 陶古日
- 哲日勒格
- 野桃
- 山毛桃
- 桃花
- 哲日勒格-陶古日(zhé rì lè gé táo gǔ rì)
异名:
- Persica davidiana
- Prunus persica var. davidiana
- Amygdalus davidiana
- Amygdalus davidiana
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Prunus-李属(lǐ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  株: 高达10米
  茎: 树皮暗紫色，光滑
  枝: 小枝细长，幼时无毛
  叶: 叶卵状披针形，长5-13厘米，先端渐尖，基部楔形，两面无毛，具细锐锯齿；叶柄长1-2厘米，无毛，常具腺体
  花: 花单生，先叶开放，径2-3厘米；花梗极短或几无梗；花萼无毛，萼筒钟形，萼片卵形或卵状长圆形，紫色：花瓣倒卵形或近圆形，长1-1.5厘米，粉红色，先端钝圆，稀微凹
  果: 核果近球形，径2.5-3.5厘米，熟时淡黄色，密被柔毛，果柄短而深入果洼；果肉薄而干，不可食，成熟时不裂；核球形或近球形，两侧扁，顶端钝圆，基部平截，具纵、横沟纹和孔穴，与果肉分离
生态习性:
  产地: 山东、河北、河南、山西、陕西、甘肃、四川、云南等地
  生境: 山坡、山谷沟底或荒野疏林及灌丛内
  海拔: 800-3200m
  物候: 花期3-4月，果期7-8月
功用价值:
  经济价值: 本种抗旱耐寒，又耐盐碱土壤，在华北地区主要作桃、梅、李等果树的砧木，也可供观赏；木材质硬而重，可作各种细工及手杖；果核可做玩具或念珠；种仁可榨油供食用
  植物文化: 山桃野杏两三栽，嫩叶商量细细开； 最是一年春好处，明朝有意抱琴来； ——宋 王安石《招叶致远》
植物志: '产山东、河北、河南、山西、陕西、甘肃、四川、云南等地。生于山坡、山谷沟底或荒野疏林及灌丛内，海拔800-3200米。

  本种抗旱耐寒，又耐盐碱土壤，在华北地区主要作桃、梅、李等果树的砧木，也可供观赏。木材质硬而重，可作各种细工及手杖。果核可做玩具或念珠。种仁可榨油供食用。

  山桃的主要观赏树种有：1. 白山桃 f. alba（Carr.）Rehd. 花白色。2. 红山桃 f. rubra（Bean）Rehd. 花玫瑰红色。

