学名: Malus spectabilis (Aiton) Borkh.
中文名: 海棠花
俗名:
- 海棠
- 日本海棠
异名:
- Pyrus spectabilis
- Malus domestica var. spectabilis
- Malus microcarpa var. spectabilis
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Malus-苹果属(píng guǒ shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 乔木
  株: 高达8米
  枝: 小枝粗，幼时被短柔毛，渐脱落；冬芽微被柔毛
  叶: 叶椭圆形至长椭圆形，长5-8厘米，边缘有紧贴细锯齿，幼时两面有稀疏短柔毛，后脱落，老叶无毛；叶柄长1.5-2厘米，具短柔毛，托叶膜质，窄披针形，早落
  花: 花4-6组成近伞形花序；花梗长2-3厘米，具柔毛；苞片膜质，披针形，早落；花径4-5厘米；被丝托外面无毛或有白色绒毛，萼片三角状卵形，外面无毛或偶有稀疏绒毛，内面密被白色绒毛，比被丝托稍短；花瓣白色，在蕾中呈粉红色；雄蕊20-25;花柱(4)5，基部有白色绒毛
  果: 果近球形，径2厘米，黄色，有宿存萼片，基部不下陷，柄洼隆起；果柄细长，近顶端肥厚，长3-4厘米
生态习性:
  产地: 河北、山东、陕西、江苏、浙江、云南
  生境: 平原或山地
  海拔: 50-2000m
  物候: 花期4-5月，果期8-9月
功用价值: 暂无数据
植物志: 暂无数据
元数据:
  来源文件: QW-蔷薇科.xlsx
  来源工作表: 海棠花
备注: 本种为我国著名观赏树种，华北、华东各地习见栽培。园艺变种有粉红色重瓣者 var. riversii (Kirchn.) Rehd.，有白色重瓣者 var. albiplena Schelle。
