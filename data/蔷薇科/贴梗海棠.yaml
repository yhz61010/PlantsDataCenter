学名: Chaenomeles speciosa (Sweet) Nakai
中文名: 贴梗海棠
俗名:
- 铁脚梨
- 贴梗木瓜
- 楙
- 木瓜
- 皱皮木瓜
异名:
- Cydonia speciosa
- Cydonia lagenaria
- Cydonia japonica var. lagenaria
- Chaenomeles lagenaria
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Rosaceae-蔷薇科(qiáng wēi kē)
  属: Chaenomeles-木瓜海棠属(mù guā hǎi táng shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶灌木
  株: 高达2米
  枝: 枝条直立，开展，有刺；小枝无毛；冬芽三角卵圆形
  叶: 叶卵形至椭圆形，稀长椭圆形，长3-9厘米，具尖锐锯齿，齿尖开展，两面无毛或幼时下面沿脉有柔毛；叶柄长约1厘米，托叶草质，肾形或半圆形，稀卵形，长0.5-1厘米，有尖锐重锯齿，无毛
  花: 花先叶开放，3-5簇生于二年生老枝；花梗粗，长约3毫米或近无柄；花径3-5厘米；被丝托钟状，外面无毛，萼片直立，半圆形，稀卵形，全缘或有波状齿和黄褐色睫毛；花瓣猩红色，稀淡红或白色，倒卵形或近圆形，基部下延成短爪；雄蕊45-50;花柱5，基部合生，无毛或稍有毛
  果: 果球形或卵球形，径4-6厘米，黄或带红色
生态习性:
  产地: 陕西、甘肃、四川、贵州、云南、广东
  分布: 缅甸
  物候: 花期3-5月，果期9-10月
功用价值:
  经济价值: '各地习见栽培，花色大红、粉红、乳白且有重瓣及半重瓣品种；早春先花后叶，很美丽；枝密多刺可作绿蓠；果实含苹果酸、酒石酸、构椽酸及丙种维生素等，干制后入药，有驱凤、舒筋、活络、镇痛、消肿、顺气之效

    投我以木瓜，报之以琼琚；匪报也，永以为好也！

    投我以木桃，报之以琼瑶；匪报也，永以为好也！

    投我以木李，报之以琼玖；匪报也，永以为好也！

    ——《诗经·卫风·木瓜》

    注：文中木瓜，即皱皮木瓜，又名贴梗海棠；木桃即毛叶木瓜，又名木瓜海棠；木李即木瓜，又名榠楂；'
植物志: 暂无数据
