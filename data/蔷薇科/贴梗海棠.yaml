备注: '植物文化：

  各地习见栽培，花色大红、粉红、乳白且有重瓣及半重瓣品种。早春先花后叶，很美丽。枝密多刺可作绿蓠。果实含苹果酸、酒石酸、构椽酸及丙种维生素等，干制后入药，有驱风、舒筋、活络、镇痛、消肿、顺气之效。'
