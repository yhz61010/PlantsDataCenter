植物志: '58a. 野蔷薇（原变种）

  R. multiflora var. multiflora

  攀援灌木；小枝圆柱形，通常无毛，有短、粗稍弯曲皮刺。小叶5-9，近花序的小叶有时3，连叶柄长5-10厘米；小叶片倒卵形、长圆形或卵形，长1.5-5厘米，宽8-28毫米，先端急尖或圆钝，基部近圆形或楔形，边缘有尖锐单锯齿，稀混有重锯齿，上面无毛，下面有柔毛；小叶柄和叶轴有柔毛或无毛，有散生腺毛；托叶篦齿状，大部贴生于叶柄，边缘有或无腺毛。花多朵，排成圆锥状花序，花梗长1.5-2.5厘米，无毛或有腺毛，有时基部有篦齿状小苞片；花直径1.5-2厘米，萼片披针形，有时中部具2个线形裂片，外面无毛，内面有柔毛；花瓣白色，宽倒卵形，先端微凹，基部楔形；花柱结合成束，无毛，比雄蕊稍长。果近球形，直径6-8毫米，红褐色或紫褐色，有光泽，无毛，萼片脱落。

  产江苏、山东、河南等省。日本、朝鲜习见。

  本种变异性强，常见庭园栽培有以下变种。

  58b. 粉团蔷薇　红刺玫（陕西）　图版68: 1-3

  R. multiflora Thunb. var. cathayensis Rehd. et Wils. in Sara. Pl. Wils. 2: 304. 1915; Rehd. in Journ. Arn. Arb. 13:311. 1932; 江苏南部种子植物手册 358. 1959: 秦岭植物志 1(2): 572. 图474. 1974. —— R. gentiliana Levl. et Vant. in Bull. Soc. Bot. Fr. 55: 55. 1908; Willmott, Gen. Ros. 2: 513. t. 1914. ——R. macrophylla Lindl. var. hypolcuca Levl. Fl. Kouy-Tcheou 354. 1915. nom. nud. ——R. cathayensis (Rehd.) Bailey in Gent. Herb. 1: 29. 1920; Hu Icon Pl. Sin. 2:26. Pl. 76. 1929; 广州植物志295. 1956. ——R. calva var. cathayensis Bouleng. in Bull. Jard. Bot. Bruxell. 9: 271. 1933. ——R. multiflora var. gentiliana (Levl. & Vant.) Yu et Tsai in Bull. Fan. Mem. Inst. Biol. Bot. ser. 7: 117. 1936. ——R. kwangsiersis Li in Journ. Arn. Arb. 26: 63. 1945.

  本变种花为粉红色，单瓣。

  产河北、河南、山东、安徽、浙江、甘肃、陕西、江西、湖北、广东、福建。多生于山坡、灌丛或河边等处，海拔可达1300米。

  根多含鞣质23-25%，可提制栲胶，鲜花含有芳香油可提制香精用于化妆品工业，根、叶、花和种子均入药，根能活血通络收敛，叶外用治肿毒，种子称营实能峻泻、利水通经。华北常见栽培作绿篱、护坡及棚架绿化材料。繁殖用种子或扦插均可。

  58c. 七姊妹（群芳谱）　十姊妹（群芳谱）

  R. multiflora Thunb. var. carnea Thory in Redoute, Roses, 2: 67. t. 1821; Rehd. et Wils. in Sarg. Pl. Wils. 2: 305. 1915; 江苏南部种子植物手册 358. 1959. Hara in Enum. Flow. Pl. Nepal 2: 143. 1979. ——R. multiflora Thunb. var. platyphylla Thory in Redoute, Roses, 2:69. t. 1821; 秦岭植物志 1(2): 573. 1974. ——R. lebrunei Levl. in Bull. Acad.Geog. Bot. 25: 46. 1915, et Cat. Pl. Yunnan 235. 1917. ——R. blinii Levl. in Bull. Acad. Geog. Bot. 25: 46. 1915, et Cat. Pl. Yunnan 234. 1917. ——R. muftiflora Thunb. var. carnea Thory f. platyphylla Rehd. et Wils. in Sarg. Pl. Wils. 2: 306. 1915.

  本变种为重瓣，粉红色。栽培供观赏，可作护坡及棚架之用。

  58d. 白玉堂

  R. multiflora Thunb. var. albo-plena Yu et Ku et Ku in Bull. Bot. Res. 1(4): 12. 1981.

  花白色，重瓣。

  北京常见栽培，扦插易生根，常作嫁接月季花的砧木。

