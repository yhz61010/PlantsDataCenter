植物志: '本变种和越橘叶黄杨异处，为叶薄革质，阔椭圆形或阔卵形，长7-10毫米，宽5-7毫米，叶面无光或光亮，侧脉明显凸出；蒴果长6-7毫米，无毛（湖北兴山产的，小枝被较长毛，叶往往呈长圆形或长圆状倒卵形，上面极光亮，其余和上所述相同）。

  产安徽（黄山）、浙江（龙塘山）、江西（庐山）、湖北（神农架及兴山）；生于岩上，海拔1000米。模式标本采自黄山。

  四川城口后坪、冉家坪海拔2300米，戴天伦105667号标本，叶和小叶黄杨相同，但小枝被毛较密，节间长0.8-2厘米，果亦被轻微短柔毛。应否视为另一变种，待再研究。

  朝鲜产的 ssp. sinica var. insularis (Nakai) M. Cheng, Comb. nov. ——Buxus microphylla Sieb. et Zucc. var. insularis Nakai in Bot. Mag. Tokyo 38: 63. 1922，就笔者所见到的标本（朝鲜产），叶厚革质，椭圆状长圆形或长圆形，长10-15毫米，宽6-8毫米，叶面侧脉不明或稍分明，不凸出，边缘向下强卷曲，和小叶黄杨全异。笔者在庐山亦未见有此变种。惟公园有时栽培（Hatusima 谓亦产于庐山，恐误）。'
