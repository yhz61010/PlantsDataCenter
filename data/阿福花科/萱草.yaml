学名: Hemerocallis fulva (L.) L.
中文名: 萱草
俗名:
- 摺叶萱草
- 黄花菜
异名:
- Hemerocallis fulva var. fulva
- Hemerocallis lilioasphodelus var. fulva
- Hemerocallis lilioasphodelus var. fulvus
- Hemerocallis fulva var. maculata
