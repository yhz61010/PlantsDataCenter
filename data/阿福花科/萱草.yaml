形态特征:
  生活型: 多年生草本
  根: 根近肉质，中下部常纺锤状
  叶: 叶条形，长40-80厘米，宽1.3-3.5厘米
  花: 花葶粗壮，高0.6-1米；圆锥花序具6-12朵花或更多，苞片卵状披针形
  果: 蒴果长圆形
生态习性:
  产地: 安徽，福建，广东，广西，贵州，河北，河南，湖北，湖南，江苏，江西，陕西，山东，山西，四川，台湾，西藏，云南，浙江
  分布: 印度，日本，韩国，俄罗斯
  生境: 林下，灌丛，草原，河边
  海拔: 300-2500米
  物候: 花果期5-7月
功用价值: 暂无数据
植物志: '萱草在我国有悠久的栽培历史，早在二千多年前的《诗经魏风》中就有记载。后来的许多植物学著作中，如《救荒本草》、《花镜》、《本草纲目》等多有记述。别名有鹿葱、川草花、忘郁、丹棘等。《花镜》中还首记载了重瓣首草，并指出它的花有毒，不可食用。由于长期的栽培，萱草的类型极多，如叶的宽窄、质地，花的色泽，花被管的长短，花被裂片的宽窄等变异很大，不易划分，加上各地常有栽培后逸为野生的，分布区也难于判断。李时珍早就注意到，在不同土质上栽培的萱草，花的质地，色泽的深浅和花期的长短是有变化的。这是正确的。如果只根据少数栽培植株的某些差异来进行分类，则不甚可靠。林奈在发表本种时，曾说是杂种，后来又说来自中国。他所根据的植物可能是欧洲广泛栽培的一个品种(在欧洲虽然有野生萱草，但是从未见关于果实的记载），但究竟是否自我国引去，已无从查考。我们认为，在长期而又广泛栽培的情况下，要考虑到种以下多半系品种这个可能性，因而不宜轻率地定为种或变种。

  本种的主要特征是：根近肉质，中下部有纺锤状膨大；叶一般较宽；花早上开晚上凋谢，无香味，桔红色至桔黄色，内花被裂片下部一般有∧形采斑。这些特征可以区别于本国产的其他种类。花果期为5-7月。

  根据花被管的长短和花的色泽等特征，本种还被详细地划分为许多变种、变型和品种。这里不作详细介绍。但最常见的是：

  萱草

  H. fulva (L.) L.

  花桔黄色；花被管较粗短，长2-3厘米；内花被裂片宽2-3厘米。全国各地常见栽培，秦岭以南各省区有野生的。

  长管萱草（变种）

  var. disticha (Donn) Baker in Journ. of Bot. 12: 3. 1874. ——Hemeroca disticha Donn, Hort. Cant. ed. 6, 93. 1811.——H. longituba Miq., Ann. Mus. Bot. Ludg. -Bat. 3: 152. 1868.——H. fulna (L.) L. var. longituba (Miq.) Maxim. in Gartenfl. 34: 98. 1885; Stout in Addisonia 15: t. 483. 1930.——H. fulva (L.) L. var. rosea Stout, l. c., t. 484.

  花桔红色至淡红色；花被管较细长，长2-4厘米；内花被裂片宽1-15厘米，很少接近2厘米。

  江西有栽培。

  重瓣萱草（变种）千叶萱草（江苏植物志）

  var. kwanso Regel in Gartenfl. 15: 66, t. 500. 1866; 江苏植物所，江苏植物志上册，374，图672. 1977.

  花桔黄色，花被裂片多数，雌雄蕊发育不全。

  北京等地有栽培。

  此外，还有其他一些类型。它们实际上都是长期栽培的，很可能是人工选择的品种，有待进一步的研究。

  据记载还有一种常绿的类型，被定名为 H. aurantiaca Baker (Gard. Chron. ser.3, 68: 94. 1890)。对于这个种，多数作者认为是日本植物，而大井次三郎则认为是中国植物，引入日本。胡秀英说是一个杂种。但据我们调查，萱草在海南岛一年四季常绿。很可能它是萱草的一个南方地理宗。这个问题还需要作进一步研究。

