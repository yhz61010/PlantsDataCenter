学名: Hemerocallis hybridus Hort.
中文名: 大花萱草
俗名:
- 杂种萱草
- 萱草杂交品种
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asparagales-天门冬目(tiān mén dōng mù)
  科: Asphodelaceae-阿福花科(ā fú huā kē)
  属: Hemerocallis-萱草属(xuān cǎo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本，根多少呈绳索状
  叶: 叶柔软，带状，上部下弯
  花: 花葶与叶近等长或高于叶，在顶端聚生2-6朵花，苞片宽卵形，先端长渐尖至尾状，花近簇生，花被黄色、紫红、白色等
  果: 蒴果椭圆形
生态习性:
  物候: 花果期6-10月，果期秋季
  栽培: 喜温暖、湿润及阳光充足的环境，较耐寒，不耐湿热；喜疏松、肥沃的微酸性土壤；生长适温15℃-28℃
功用价值:
  经济价值: 品种繁多，花期长，花大色艳，为常见栽培的观赏草花；适合公园、绿地、校园等路边、林缘下、假山石边或水岸边栽培观赏；盆栽可用于阳台、窗台及天台绿化
植物志: 暂无数据
