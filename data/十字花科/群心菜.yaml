学名: Lepidium draba L.
中文名: 群心菜
俗名: 无
异名:
- Cardaria draba
- Cochlearia draba
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Brassicales-十字花目(shí zì huā mù)
  科: Brassicaceae-十字花科(shí zì huā kē)
  属: Lepidium-独行菜属(dú xíng cài shǔ)
物种保护: 暂无数据
分类信息:
  模式产地: 模式标本采自欧洲
形态特征:
  生活型: 多年生草本
  株: 高达50厘米
  茎: 茎直立，多分枝，有短单毛
  叶: 基生叶倒卵状匙形，长3-10厘米，边缘有波状齿，无柄，开花时枯萎；茎生叶倒卵形、长圆形或披针形，长4-10厘米，先端钝，有小锐尖头，基部心形，抱茎，边缘疏生波状齿或全缘，两面被柔毛
  花: 总状花序圆锥状；萼片长圆形，长约2毫米；花瓣白色，倒卵状匙形，长约4毫米，先端微凹，基部渐窄成爪
  果: 短角果卵形或近球形，长3-4.5毫米；果瓣有脊及网纹，无毛；宿存花柱长约1.5毫米；果柄长0.5-1厘米
  种子: 种子宽卵圆形或椭圆形，长约2毫米，棕色，无翅
生态习性:
  产地: 辽宁（旅顺，为外来种）、新疆
  分布: 欧洲中部及西部、亚洲中部及西部均，并传播至北美洲
  生境: 山坡路边、田间、河滩及水沟边
  物候: 花期5-6月，果期7-8月
功用价值: 暂无数据
植物志: 产辽宁（旅顺，为外来种）、新疆。生在山坡路边、田间、河滩及水沟边。欧洲中部及西部、亚洲中部及西部均有分布，并传播至北美洲。模式标本采自欧洲。
