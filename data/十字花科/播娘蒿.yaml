学名: Descurainia sophia (L.) Webb ex Prantl
中文名: 播娘蒿
俗名:
- 腺毛播娘蒿
异名:
- Descurainia sophioides
- Sisymbrium sophia
- Descurainia sophia var. glabrata
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Brassicales-十字花目(shí zì huā mù)
  科: Brassicaceae-十字花科(shí zì huā kē)
  属: Descurainia-播娘蒿属(bō niáng hāo shǔ)
物种保护:
  濒危等级: 无危(LC)
分类信息:
  模式产地: 模式标本采自欧洲
形态特征:
  生活型: 一年生草本
  株: 被分枝毛，茎下部毛多，向上毛渐少或无毛
  茎: 茎直立，基部分枝
  叶: 叶柄长约2厘米，叶长6-19厘米，宽4-8厘米，3回羽状深裂，小裂片线形或长圆形，长（0.2-)0.3-1厘米
  花: 萼片窄长圆形，背面具分叉柔毛；花瓣黄色，长圆状倒卵形，长2-2.5毫米，基部具爪；雄蕊比花瓣长1/3
  果: 长角果圆筒状，长2.5-3厘米，无毛，种子间缢缩，开裂；果瓣中脉明显；果柄长1-2厘米
  种子: 种子每室1行，小而多，长圆形，长约1毫米，稍扁，淡红褐色，有细网纹
生态习性:
  产地: 除华南外全国各地均产
  分布: 亚洲、欧洲、非洲及北美洲均
  生境: 山坡、田野及农田
  物候: 花果期4-6月
功用价值: 暂无数据
植物志: '除华南外全国各地均产。生于山坡、田野及农田。亚洲、欧洲、非洲及北美洲均有分布。模式标本采自欧洲。

  种子含油40％，油工业用，并可食用；种子亦可药用，有利尿消肿、祛痰定喘的效用。'
元数据:
