学名: Orychophragmus violaceus (L.) O. E. Schulz
中文名: 诸葛菜
俗名:
- 二月蓝
- 紫金菜
- 菜子花
- 短梗南芥
- 毛果诸葛菜
- 缺刻叶诸葛菜
异名:
- Brassica violacea
- Raphanus violaceus
- Orychophragmus sonchifolius
- Moricandia sonchifolia
- Moricandia sonchifolia var. homaeophylla
- Orychophragmus sonchifolius var. subintegrifolius
- Orychophragmus sonchifolius var. intermedius
- Arabis chanetii
- Raphanus chanetii
- Raphanus courtoisii
- Cardamine potentillifolia
- Orychophragmus violaceus var. homaeophyllus
- Orychophragmus violaceus var. intermedius
- Orychophragmus violaceus var. subintegrifolius
- Orychophragmus violaceus var. lasiocarpus
描述: 一年生或二年生草本，高10–50厘米。茎直立。基生叶大头羽状分裂，茎生叶基部耳状抱茎。总状花序顶生，花紫色或淡红色。长角果线形，具四棱。花期3–5月，果期4–6月。我国各地广布。生于平原、山地、路旁，早春开花，为优良观赏地被、蜜源植物，嫩茎叶可作蔬菜。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Brassicales-十字花目(shí zì huā mù)
  科: Brassicaceae-十字花科(shí zì huā kē)
  属: Orychophragmus-诸葛菜属(zhū gě cài shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 一年生或二年生草本
  株: 高达50厘米
  根: 主根圆锥状
  茎: 茎直立，单一或上部分枝
  叶: 基生叶心形，锯齿不整齐，柄长7-9厘米；下部茎生叶大头羽状深裂或全裂，顶裂片卵形或三角状卵形，长3-7厘米，全缘、有牙齿、钝齿或缺刻，基部心形，有不规则钝齿，侧裂片2-6对，斜卵形、卵状心形或三角形，全缘或有齿；上部叶长圆形或窄卵形，长4-9厘米，基部耳状抱茎，锯齿不整齐
  花: 花紫或白色；萼片长达1.6厘米，紫色；花瓣宽倒卵形，长1-1.5厘米，基部爪长达1.5厘米
  果: 长角果线形，长7-10厘米，具4棱
  种子: 种子卵圆形或长圆形，黑棕色，有纵条纹
生态习性:
  产地: 辽宁、河北、山西、山东、河南、安徽、江苏、浙江、湖北、江西、陕西、甘肃、四川
  分布: 朝鲜
  生境: 平原、山地、路旁或地边
  海拔: 1450m
  物候: 花期3-5月，果期5-6月
功用价值: 暂无数据
植物志: 暂无数据
