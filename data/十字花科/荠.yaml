学名: Capsella bursa-pastoris (L.) Medik.
中文名: 荠
俗名:
- 地米菜
- 芥
- '荠菜(jì cài)

  菱角菜(líng jiǎo cài)'
异名:
- Thlaspi bursa-pastoris
- Thlaspi bursapastoris
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Brassicales-十字花目(shí zì huā mù)
  科: Brassicaceae-十字花科(shí zì huā kē)
  属: Capsella-荠属(jì shǔ)
物种保护:
  濒危等级: 无
分类信息:
  模式产地: 模式标本采自欧洲
形态特征:
  生活型: 一年或二年生草本
  叶: 基生叶丛生呈莲座状，大头羽状分裂，顶裂片卵形至长圆形，侧裂片长圆形至卵形；茎生叶窄披针形或披针形，基部箭形，抱茎，边缘有缺刻或锯齿
  花: 总状花序顶生及腋生，萼片长圆形，花瓣白色，卵形，有短爪
  果: 短角果倒三角形或倒心状三角形，扁平，顶端微凹；种子2行，长椭圆形，浅褐色
生态习性:
  产地: 分布几遍全国，全世界温带地区广布
  分布: 全世界温带地区广布
  生境: 山坡、田边及路旁
  物候: 花果期4-6月
功用价值:
  经济价值: 全草入药，茎叶作蔬菜食用，种子含油
植物志: '分布几遍全国；全世界温带地区广布。野生，偶有栽培。生在山坡、田边及路旁。模式标本采自欧洲。

  全草入药，有利尿、止血、清热、明目、消积功效；茎叶作蔬菜食用；种子含油20-30％，属干性油，供制油漆及肥皂用。'
