学名: Ailanthus altissima (Mill.) Swingle
中文名: 臭椿
俗名:
- 樗
- 皮黑樗
- 黑皮樗
- 黑皮互叶臭椿
- 南方椿树
- 椿树
- 黑皮椿树
- 灰黑皮椿树
- 灰黑皮樗
异名:
- Toxicodendron altissimum
- Rhus cacodendron
- Albonia peregrina
- Ailanthus glandulosa
- Pongelion glandulosum
- Ailanthus cacodendron
描述: 落叶乔木，高可达20米。树皮平滑有直纹。奇数羽状复叶互生，小叶13–27枚，卵状披针形，基部具1–2对粗齿，齿端有腺点，揉之有臭味。圆锥花序顶生，花小，淡绿色。翅果长椭圆形，种子位于中央。花期4–5月，果期8–9月。我国除黑龙江、吉林、新疆外广布，耐旱、耐盐碱、速生，为荒山造林与工矿区绿化树种。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Sapindales-无患子目(wú huàn zǐ mù)
  科: Simaroubaceae-苦木科(kǔ mù kē)
  属: Ailanthus-臭椿属(chòu chūn shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶乔木
  株: 高达20余米
  枝: 嫩枝被黄或黄褐色柔毛，后脱落
  叶: 奇数羽状复叶，长40-60厘米，叶柄长7-13厘米；小叶13-27，对生或近对生，纸质，卵状披针形，长7-13厘米，宽2.5-4厘米，先端长渐尖，基部平截或稍圆，全缘，具1-3对粗齿，齿背有腺体，下面灰绿色
  花: 圆锥花序长达30厘米
  果: 翅果长椭圆形，长3-4.5厘米
生态习性:
  物候: 花期4-5月，果期8-10月
功用价值: 暂无数据
植物志: 本种在石灰岩地区生长良好，可作石灰岩地区的造林树种，也可作园林风景树和行道树。木材黄白色，可制作农具车辆等；叶可饲椿蚕（天蚕）；树皮、根皮、果实均可入药，有清热利湿、收敛止痢等效；种子含油35％。本种在北美、欧、亚洲不少城市自行繁殖，成为“杂草树”。
