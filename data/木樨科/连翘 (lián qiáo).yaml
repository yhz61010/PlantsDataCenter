备注: '城市景观里 80%~95% 都是杂交连翘。原因：花最多（景观效果最好）。

  树形最整齐。

  抗污染强。

  最适合园林修剪。

  连翘与金钟花极其相像，外部很难辨认。而金钟连翘是它俩的杂交品种，所以与它们更难区分。折枝看髓是区分它们最准确的方法。

  项目：连翘

  本质：原生种（连翘属）

  花瓣：4裂（常呈十字状展开）

  花量：中等，常不如杂交连翘爆花

  花排列：通常单生或2至数朵，生于叶腋

  叶片：通常单叶，有时3裂至三出复叶；叶多无毛

  叶缘：除基部外具锐锯齿或粗锯齿

  枝条姿态：木质、较粗、长枝呈明显拱形下垂，甚至可贴地生长。质感偏韧

  枝条颜色：黄褐、灰褐

  开花时间：3月-4月（仲春）

  准确判断法：枝条中心是空的（节与节之间中空，只有节部有髓）

  准确判断法：折一小段当年生枝条，纵向切开看中间。'
