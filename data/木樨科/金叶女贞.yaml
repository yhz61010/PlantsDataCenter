学名: Ligustrum × vicaryi Rehder
中文名: 金叶女贞
俗名: 无
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Oleaceae-木樨科(mù xī kē)
  属: Ligustrum-女贞属(nǚ zhēn shǔ)
物种保护: 暂无数据
分类信息:
  分类讨论: 金叶女贞是美国加州的金边女贞与欧洲女贞树种杂交而成
形态特征:
  生活型: 落叶灌木，株高2-3米
  叶: 叶革薄质，单叶对生，椭圆形或卵状椭圆形，先端尖，基部楔形，全缘；新叶金黄色，因此得名为金叶女贞，老叶黄绿色至绿色
  花: 总状花序，花为两性，呈筒状白色小花；核果椭圆形，内含一粒种子，颜色为黑紫色
生态习性:
  分布: 由金边女贞与欧洲女贞杂交育成的，20世纪80年代引入我国，现各地广为栽培
  物候: 花期5-6月，果期10月
  栽培: 性喜光，耐荫性较差，耐寒力中等，适应性强，以疏松肥沃、通透性良好的沙壤土为最好
功用价值:
  经济价值: 金叶女贞叶色金黄，耐修剪，是重要的绿篱和模纹图案材料，常与紫叶小檗、黄杨、龙柏等搭配使用；也常用于绿地广场的组字，还可以用于小庭院装饰
  植物文化: '秋浦歌十七首 其十

    【作者】李白 【朝代】唐

    千千石楠树，万万女贞林；

    山山白鹭满，涧涧白猿吟；

    君莫向秋浦，猿声碎客心'
植物志: 暂无数据
