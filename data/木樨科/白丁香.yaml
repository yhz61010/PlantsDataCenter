形态特征:
  生活型: 灌木或小乔木
  枝: 小枝、花序轴、花梗、苞片、花萼、幼叶两面及叶柄均密被腺毛
  叶: 叶片较小，基部通常为截形、圆楔形至近圆形，或近心形
  花: 花白色；叶片较小，基部通常为截形、圆楔形至近圆形，或近心形
  果: 果卵圆形或长椭圆形，长1-1.5(-2)厘米，顶端长渐尖，几无皮孔
生态习性:
  产地: 我国长江流域以北普遍栽培
  物候: 花期4-5月，果期6-10月
