学名: Ulmus pumila L.
中文名: 榆
俗名:
- 白榆
- 家榆
- 榆树
- 钻天榆
异名:
- Ulmus manshurica
- Ulmus pumila var. microphylla
- Ulmus campestris var. pumila
描述: 落叶乔木，高可达25米。树皮暗灰色，纵裂。叶卵形至椭圆状披针形，边缘具重锯齿，基部偏斜。花先叶开放，簇生。翅果近圆形，果核位于中央。花期3–4月，果期4–5月。我国东北、华北、西北、西南广布。耐寒、耐旱、速生，为北方行道、防护林、用材、绿化优良树种。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Rosales-蔷薇目(qiáng wēi mù)
  科: Ulmaceae-榆科(yú kē)
  属: Ulmus-榆属(yú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶乔木
  株: 高达25米，胸径1米
  枝: 小枝无木栓翅；冬芽内层芽鳞边缘具白色长柔毛
  叶: 叶椭圆状卵形、长卵形、椭圆状披针形或卵状披针形，长2-8厘米，先端渐尖或长渐尖，基部一侧楔形或圆，一侧圆或半心形，上面无毛，下面幼时被短柔毛，后无毛或部分脉腋具簇生毛，具重锯齿或单锯齿；侧脉9-16对，叶柄长0.4-1厘米
  花: 花在去年生枝叶腋成簇生状
  果: 翅果近圆形，稀倒卵状圆形，长1.2-2厘米，仅顶端缺口柱头面被毛，余无毛；果核位于翅果中部，其色与果翅相同；宿存花被无毛，4浅裂，具缘毛：果柄长1-2毫米
生态习性:
  产地: 东北、华北、西北及西南各省区
  分布: 朝鲜、前俄罗斯、蒙古
  生境: 山坡、山谷、川地、丘陵及沙岗等处
  海拔: 1000-2500m
  物候: 花果期3-6月（东北较晚）
功用价值: 暂无数据
植物志: '11. 榆树（通用名） 榆（尔雅），白榆（江苏、山西、甘肃），家榆（河北、河南），钻天榆、钱榆（江苏），长叶家榆、黄药家榆（东北木本植物图志）图版112: 1-6

  分布于东北、华北、西北及西南各省区。生于海拔1 000-2 500米以下之山坡、山谷、川地、丘陵及沙岗等处。长江下游各省有栽培。也为华北及淮北平原农村的习见树木。朝鲜、前苏联、蒙古也有分布。

  边材窄，淡黄褐色，心材暗灰褐色，纹理直，结构略粗，坚实耐用。供家具、车辆、农具、器具、桥梁、建筑等用。树皮内含淀粉及粘性物，磨成粉称榆皮面。掺合面粉中可食用，并为作醋原料；枝皮纤维坚韧，可代麻制绳索、麻袋或作人造棉与造纸原料；幼嫩翅果与面粉混拌可蒸食，老果含油25％，可供医药和轻、化工业用；叶可作饲料。树皮、叶及翅果均可药用，能安神、利小便。

  阳性树，生长快，根系发达，适应性强，能耐干冷气候及中度盐硷，但不耐水湿（能耐雨季水涝）。在土壤深厚、肥沃、排水良好之冲积土及黄土高原生长良好。可作西北荒漠、华北及淮北平原、丘陵及东北荒山、砂地及滨海盐硷地的造林或“四旁”绿化树种。

  龙爪榆（河北习见树木图说）

  Ulmus pumila L. cv. ''Pendula''——U. cam pestris L. var. parvifolia f. pendula Kirchner in Petzold and Korchner, Arb. Muscav. 555. 1864.——U. pumila L. var. pendula Hort. ex Rehd. in Bailey, Cycl. Am. Hort. 4: 1882. 1902;周汉藩, 河北习见树木图说88. 1934;陈嵘, 中国树木分类学210. 1937.——U. pumila L. f. pendula (Kirchner) Rehd. Bibliogr. Cult. Trees and Shrubs 143. 1949; 河南植物志1: 264. 1981.

  与榆树的主要区别在于小枝卷曲或扭曲而下垂。

  栽培。

  园林树供观赏。

  垂枝榆（通用名）

  Ulmus pumila L. cv. ''Tenue''——U. pumila L. f. tenue S. Y. Wang, nom. cum descr. chinen., 河南农林科技45: 29. 1978; 河南植物志1: 264. 1981.

  树干上部的主干不明显，分枝较多，树冠伞形；树皮灰白色，较光滑；一至三年生枝下垂而不卷曲或扭曲。

  内蒙古、河南、河北、辽宁及北京等地栽培。

