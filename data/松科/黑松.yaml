学名: Pinus thunbergii Parl.
中文名: 黑松
俗名:
- 日本黑松
异名:
- Pinus thunbergiana
描述: 常绿乔木，高可达30米。树皮灰黑色，裂成块片。针叶2针一束，粗硬深绿。雌雄同株，球果圆锥状卵形。花期4–5月，球果翌年10月成熟。原产日本、朝鲜，我国沿海广泛栽培。耐海风、耐盐碱，为海岸防护林首选，也是庭院、盆景、行道优良树种。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Pinopsida-松纲(sōng gāng)
  目: Pinales-松目(sōng mù)
  科: Pinaceae-松科(sōng kē)
  属: Pinus-松属(sōng shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 乔木
  株: 高达30米，胸径可达2米；幼树树皮暗灰色，老则灰黑色，粗厚，裂成块片脱落；枝条开展，树冠宽圆锥状或伞形；一年生枝淡褐黄色，无毛；冬芽银白色，圆柱状椭圆形或圆柱形，顶端尖，芽鳞披针形或条状披针形，边缘白色丝状
  叶: 针叶2针一束，深绿色，有光泽，粗硬，长6-12厘米，径1.5-2毫米，边缘有细锯齿，背腹面均有气孔线；横切面皮下层细胞一或二层、连续排列，两角上二至四层，树脂道6-11个，中生
  花: 雄球花淡红褐色，圆柱形，长1.5-2厘米，聚生于新枝下部；雌球花单生或2-3个聚生于新枝近顶端，直立，有梗，卵圆形，淡紫红色或淡褐红色
  果: 球果成熟前绿色，熟时褐色，圆锥状卵圆形或卵圆形，长4-6厘米，径3-4厘米，有短梗，向下弯垂；中部种鳞卵状椭圆形，鳞盾微肥厚，横脊显著，鳞脐微凹，有短刺；种子倒卵状椭圆形，长5-7毫米，径2-3.5毫米，连翅长1.5-1.8厘米，种翅灰褐色，有深色条纹；子叶5-10（多为7-8）枚，长2-4厘米，初生叶条形，长约2厘米，叶缘具疏生短刺毛，或近全缘
生态习性:
  产地: 我国旅顺、大连、山东沿海地带和蒙山山区以及武汉、南京、上海、杭州等地引种栽培
  分布: 原产日本及朝鲜南部海岸地区
  物候: 花期4-5月，种子第二年10月成熟
功用价值: 暂无数据
