学名: Euonymus japonicus Thunb.
中文名: 冬青卫矛
俗名:
- 扶芳树
- '正木(zhèng mù)

  大叶黄杨(dà yè huáng yáng)'
异名:
- Euonymus sinensis
- Masakia japonica
- Euonymus japonica
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Celastrales-卫矛目(wèi máo mù)
  科: Celastraceae-卫矛科(wèi máo kē)
  属: Euonymus-卫矛属(wèi máo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 常绿灌木
  株: 高达3米
  枝: 小枝具4棱
  叶: 叶对生，革质，倒卵形或椭圆形，长3-5厘米，先端圆钝，基部楔形，具浅细钝齿，侧脉5-7对；叶柄长约1厘米
  花: 聚伞花序2-3次分枝，具5-12花；花序梗长2-5厘米；花白绿色，径5-7毫米；花萼裂片半圆形；花瓣近卵圆形；花盘肥大，径约3毫米；花丝长1.5-4毫米，常弯曲；子房每室2胚珠，着生中轴顶部
  果: 蒴果近球形，径约8毫米，熟时淡红色
  种子: 种子每室1，顶生，椭圆形，长约6毫米，假种皮桔红色，全包种子
生态习性:
  产地: 本种最先于日本发现、引入栽培、我国南北各省区均有栽培、野生者多在近人家处发现
  物候: 花期6-7月，果熟期9-10月
功用价值:
  经济价值: 栽培观赏或做绿篱
  植物文化: '百丈休牵上濑船，一钩归钓缩头鳊；

    园中草木春无数，只有黄杨厄闰年；

    ——宋 苏轼《退圃》'
植物志: '本种最先于日本发现，引入栽培，观赏或做绿篱，我国南北各省区均有栽培，野生者多在近人家处发现，是否栽培逸出，尚不详知。本种果平滑，从未见有刺，马来西亚植物志记述本种果实有具刺倾向，恐怕不是本种。由于长期栽培，叶形大小及叶面斑纹等变异，有多数园艺变型。如金边黄杨 var. aurea-marginatus，银边黄杨 var. albomarginatus 等都是栽培变型，不能视为正式分类单位。

  下级分类

  银边黄杨 Euonymus japonicus var. albo-marginatus

  金边黄杨 Euonymus japonicus var. aurea-marginatus'
