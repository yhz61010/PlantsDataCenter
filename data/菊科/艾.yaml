描述: 多年生草本，高80–150厘米。茎直立被灰白色绒毛。叶厚纸质，上面被短毛，下面密被白色绒毛，羽状深裂。头状花序椭圆形，排成圆锥状。瘦长圆形。花期7–10月，果期9–11月。我国各地广布。全草入药，有温经止血、散寒调经功效，艾叶可灸、可作食品原料，为传统药用植物。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Artemisia-蒿属(hāo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本或稍亚灌木状，植株有浓香
  茎: 茎有少数短分枝：茎、枝被灰色蛛丝状柔毛
  叶: 叶上面被灰白色柔毛，兼有白色腺点与小凹点，下面密被白色蛛丝状线毛；基生叶具长柄；茎下部叶近圆形或宽卵形，羽状深裂，每侧裂片2-3，裂片有2-3小裂齿，干后下面主、侧脉常深褐或绣色，叶柄长0.5-0.8厘米；中部叶卵形、三角状卵形或近菱形，长5-8厘米，一（二）回羽状深裂或半裂，每侧裂片2-3，裂片卵形、卵状披针形或披针形，宽2-3(4)毫米，干后主脉和侧脉深褐或诱色，叶柄长0.2-0.5厘米；上部叶与苞片叶羽状半裂、浅裂、3深裂或不裂
  花: 头状花序椭圆形，径2.5-3(-3.5)毫米，排成穗状花序或复穗状花序，在茎上常组成尖塔形窄圆锥花序；总苞片背面密被灰白色蛛丝状绵毛，边缘膜质；雌花6-10;两性花8-12，檐部紫色
  果: 瘦果长卵圆形或长圆形
生态习性:
  产地: 分布广，除极干旱与高寒地区外，几遍及全国
  分布: 蒙古、朝鲜、苏联（远东地区）也有。日本有栽培
  生境: 生于低海拔至中海拔地区的荒地、路旁河边及山坡等地，也见于森林草原及草原地区，局部地区为植物群落的优势种
  海拔: 0-1500米
  物候: 花果期7-10月
功用价值:
  理化特性: '据本所植物化学分析报道，艾蒿（野生种）与蕲艾（栽培品种）挥发油中的成分基本一致，均含有乙酸乙醋（acetate ester）、1,8-桉叶油素、水合莰烯（camphene hydrote）、樟脑、龙脑（borneol）等，另外艾蒿含蒿酮，而蕲艾含侧柏酮（见《云南植物研究》，7(4): 443-445.1985）。药理分析挥发油对多种霉菌、球菌、杆菌有抑制作用，还有平喘、镇咳作用。'
  经济价值: 全草入药，有温经、去湿、散寒、止血、消炎、平喘、止咳、安胎、抗过敏等作用。历代医籍记载为“止血要药”，又是妇科常用药之一，治虚寒性的妇科疾患尤佳，又治老年慢性支气管炎与哮喘，煮水洗浴时可防治产褥期母婴感染疾病，或制药枕头、药背心，防治老年慢性支气管炎或哮喘及虚寒胃痛等；艾叶晒干捣碎得“艾绒”，制艾条供艾灸用，又可作“印泥”的原料。此外全草作杀虫的农药或薰烟作房间消毒、杀虫药。嫩芽及幼苗作菜蔬。
植物志: '56. 艾（植物名实图考）　艾蒿（尔雅、本草纲目），白蒿[神农本草经（部分）、本草纲目（部分）]，冰台（尔雅），医草（名医别录），甜艾（本草求原），灸草（埤雅），海艾、白艾、蕲艾（本草纲目），阿及艾（江苏南部种子植物手册），家艾、艾叶、陈艾（中药俗称），大叶艾、祁艾（河北），大艾、艾绒、艾蓬（江苏、江西、上海），五月艾（福建、广东、四川），黄草（台湾），野艾（湖北、湖南、广东、四川），白陈艾、家陈艾（四川），红艾、火艾（云南），“恰尔古斯一苏伊加”、“荽哈”（蒙语名），“黑阴威”（瑶族土名）

  56a. 艾（原变种）

  分布广，除极干旱与高寒地区外，几遍及全国。生于低海拔至中海拔地区的荒地、路旁河边及山坡等地，也见于森林草原及草原地区，局部地区为植物群落的优势种。蒙古、朝鲜、苏联（远东地区）也有。日本有栽培。模式标本采自中国华北。

  本种植物早在《神农本草经》中已有记述，称“白蒿”（一部分），历代古本草书记述的“白蒿”或“白艾”，其陆生种的大部分植物实际上是包括了本种及其近缘种，如宽叶山蒿 A. stolonif era (Maxim.) Komar、湘赣艾 A. gilvescens Miq.、野艾蒿 A. lavandulaefolia DC.、南艾蒿 A. verlotorum Lamotte，白叶蒿 A. leuco phylla (Turcz. ex Bess.) C. B. Clarke、蒙古蒿 A. mongolica (Fisch. ex Bess.) Nakai、红足蒿 A. rubripes Nakai、五月艾 A. indico Willd.、魁蒿 A. princeps Pamp. 及歧茎蒿 A. igniaria Maxim. 等多种“复合种”的名称。

  《本草纲目》除记载有“白蒿”及“白艾’，外，还记载有“蕲艾”（产蕲州，今湖北省蕲春县薪州镇），可入药。此系艾的栽培品种 cv. qiai，与原种（野生种）的区别在于：栽培品种植株高大，高150-250厘米，香气浓烈；叶厚纸质，被毛密而厚，中部叶羽状浅裂，上部叶通常不分裂，椭圆形或长椭圆形，最长可达7-8厘米，宽1.5厘米，叶揉之常成棉絮状；入药，性温、苦、辛、微甘。

  据本所植物化学分析报道，艾蒿（野生种）与蕲艾（栽培品种）挥发油中的成分基本一致，均含有乙酸乙醋（acetate ester）、1,8-桉叶油素、水合莰烯（camphene hydrote）、樟脑、龙脑（borneol）等，另外艾蒿含蒿酮，而蕲艾含侧柏酮（见《云南植物研究》，7(4): 443-445.1985）。药理分析挥发油对多种霉菌、球菌、杆菌有抑制作用，还有平喘、镇咳作用。

  全草入药，有温经、去湿、散寒、止血、消炎、平喘、止咳、安胎、抗过敏等作用。历代医籍记载为“止血要药”，又是妇科常用药之一，治虚寒性的妇科疾患尤佳，又治老年慢性支气管炎与哮喘，煮水洗浴时可防治产褥期母婴感染疾病，或制药枕头、药背心，防治老年慢性支气管炎或哮喘及虚寒胃痛等；艾叶晒干捣碎得“艾绒”，制艾条供艾灸用，又可作“印泥”的原料。此外全草作杀虫的农药或薰烟作房间消毒、杀虫药。嫩芽及幼苗作菜蔬。

  56b. 朝鲜艾（变种）　朝鲜艾蒿（东北植物检索表），野艾（内蒙古植物志），深裂叶艾蒿（俗称）

  Artemisia argyi Levl. et Van. var. gracilis Pamp. l. c. 36: 453, fig. 83. 1930;东北植物检索表390. 1959; S. Y. Hu l. c. 18 (1-2): 124. 1965. ——A. chiarugii Pamp. l. c. 36: 486. 1930; Kitag. Lineam. Fl. Mansh. 424. 1939; Kitam. in Act. Phytotax. Geobot. 12: 154. 1943; S. Y. Hu l. c. 18 (1-2): 129. 1965; Noda, Fl. N.-E. Prov. (Mansh.) China 1211. 1971.

  与原变种区别在于本变种茎中部叶为羽状深裂。

  分布区与用途同原变种。

