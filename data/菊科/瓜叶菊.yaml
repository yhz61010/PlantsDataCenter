学名: Pericallis × hybrida (Regel) B. Nord.
中文名: 瓜叶菊
俗名:
- 无
异名:
- Cineraria cruenta
- Senecio cruentus
- Cineraria hybrida
- Pericallis hybrida
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Pericallis-瓜叶菊属(guā yè jú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本
  茎: 茎密被白色长柔毛
  叶: 叶肾形或宽心形，有时上部叶三角状心形，长10-15厘米，宽10-20厘米，先端尖或渐尖，基部深心形，边缘不规则三角状浅裂或具钝锯齿，下面密被绒毛，叶脉掌状，在上面下凹，叶柄长4-10厘米，基部抱茎；上部叶近无柄
  花: 头状花序径3-5厘米，排成宽伞房状，花序梗长3-6厘米；总苞钟状，长0.5-1厘米，总茵片披针形；小花紫红、淡蓝、粉红或近白色；舌片长椭圆形，长2.5-3.5厘米；管状花黄色，长约6毫米
  果: 瘦果长圆形，长约1.5毫米；冠毛白色
生态习性:
  产地: 我国各地公园或庭院广泛栽培；花色美丽鲜艳，色彩多样，是一种常见的盆景花卉和装点庭院居室的观赏植物
  分布: 原产大西洋加那利群岛
  物候: 花果期3-7月
功用价值: 暂无数据
植物志: 原产大西洋加那利群岛。我国各地公园或庭院广泛栽培。花色美丽鲜艳，色彩多样，是一种常见的盆景花卉和装点庭院居室的观赏植物。
