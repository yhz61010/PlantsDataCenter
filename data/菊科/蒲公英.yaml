学名: Taraxacum mongolicum Hand.-Mazz.
中文名: 蒲公英
俗名:
- 黄花地丁
- 婆婆丁
- 蒙古蒲公英
- 灯笼草
- 姑姑英
- 地丁
异名:
- Taraxacum argute-denticulatum
- Taraxacum pseudodissectum
- Taraxacum huhhoticum
- Taraxacum hondae
- Taraxacum hangchouense
- Taraxacum kansuense
- Taraxacum mongolicum var. formosanum
- Taraxacum monogolicum
描述: 多年生草本，高10–30厘米。基生叶莲座状，倒披针形，羽状深裂或浅裂。花葶单一，顶生头状花序，舌状花黄色。瘦果顶端具细长喙，冠毛白色。花期4–9月，果期5–10月。我国各地广布。全草可入药，清热解毒、消肿散结，嫩苗可食用，为常见野生草本。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Taraxacum-蒲公英属(pú gōng yīng shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本
  叶: 叶倒卵状披针形、倒披针形或长圆状披针形，长4-20厘米，边缘有时具波状齿或羽状深裂，有时倒向羽状深裂或大头羽状深裂，顶端裂片较大，三角形或三角状戟形，全缘或具齿，每侧裂片3-5，裂片三角形或三角状披针形，通常具齿，平展或倒向，裂片间常生小齿，基部渐窄成叶柄，叶柄及主脉常带红紫色，疏被蛛丝状白色柔毛或几无毛
  花: 花葶1至数个，高10-25厘米，上部紫红色，密被总苞钟状，长1.2-1.4厘米，淡绿色，总苞片2-3层，外层卵状披针形或披针形，长0.8-1厘米，边缘宽膜质，基部淡绿色，上部紫红色，先端背面增厚或具角状突起；内层线状披针形，长1-1.6厘米，先端紫红色，背面具小角状突起
  果: 瘦果倒卵状披针形，暗褐色，长约4-5毫米，上部具小刺，下部具成行小瘤，顶端渐收缩成长约1毫米圆锥形或圆柱形喙基，喙长0.6-1厘米，纤细；冠毛白色，长约6毫米
生态习性:
  产地: 黑龙江、吉林、辽宁、内蒙古、河北、山西、陕西、甘肃、青海、山东、江苏、安徽、浙江、福建北部、台湾、河南、湖北、湖南、广东北部、四川、贵州、云南等省区
  分布: 朝鲜、蒙古、俄罗斯
  生境: 广泛生于中、低海拔地区的山坡草地、路边、田野、河滩
  物候: 花期4-9月，果期5-10月
功用价值: 暂无数据
植物志: '产黑龙江、吉林、辽宁、内蒙古、河北、山西、陕西、甘肃、青海、山东、江苏、安徽、浙江、福建北部、台湾、河南、湖北、湖南、广东北部、四川、贵州、云南等省区。广泛生于中、低海拔地区的山坡草地、路边、田野、河滩。朝鲜、蒙古、俄罗斯也有分布。

  本种分布广，植株大小变异较大。本种与上面列为新异名的6个种，按原描述及标本，其内层总苞片先端均增厚或有小角状突起，瘦果上部具小刺，下部具成行排列的小瘤等特征均相同，在叶片形状或总苞片的形状及其先端小角的大小等略有区别，但其特征仍然是连续而没有明显的间断，因此予以归并，同时也归并了前人分立各种下的变型。

  全草供药用，有清热解毒、消肿散结的功效。'
