分类信息:
  模式产地: 模式标本采自波兰
形态特征:
  生活型: 多年生草本
  茎: 茎上部花序分枝无毛或有薄绒毛
  叶: 基生叶和中部茎生叶椭圆形、长椭圆形或椭圆状倒披针形，长7-15厘米，基部楔形，通常无叶柄；上部叶渐小，椭圆形、披针形或线状披针形：茎生叶均不裂，叶缘有细密针刺，或大部茎叶羽状浅裂或半裂或有粗大圆齿，裂片或锯齿斜三角形，先端有较长针刺，两面绿色或下面色淡，无毛，稀下面被绒毛呈灰色或两面被薄绒毛
  花: 头状花序单生茎端或排成伞房花序；总苞卵圆形或长卵形，径1.5-2厘米，总苞片约6层，覆瓦状排列，向内层渐长，先端有刺尖，外层及中层长5-8毫米，内层长椭圆形或线形，长1.1-2厘米；小花紫红或白色，雌花花冠长2.4厘米，檐部长6毫米，管部细丝状，长1.8厘米；两性花花冠长1.8厘米，檐部长6毫米，管部细丝状，长1.2毫米
  果: 瘦果淡黄色，椭圆形或偏斜椭圆形，顶端斜截；冠毛污白色
生态习性:
  产地: 除西藏、云南、广东、广西外，几遍全国各地
  分布: 欧洲东部、中部、俄罗斯东、西西伯利亚及远东、蒙古、朝鲜、日本广
  生境: 分布平原、丘陵和山地
  海拔: 170-2650m
  物候: 花果期5-9月
功用价值: 暂无数据
植物志: 除西藏、云南、广东、广西外，几遍全国各地。分布平原、丘陵和山地。生于山坡、河旁或荒地、田间，海拔170-2650米。欧洲东部、中部、苏联东、西西伯利亚及远东、蒙古、朝鲜、日本广有分布。模式标本采自波兰。
