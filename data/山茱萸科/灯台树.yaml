- Cornus sanguinea Thunberg
- Cornus japonica
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Cornales-山茱萸目(shān zhū yú mù)
  科: Cornaceae-山茱萸科(shān zhū yú kē)
  属: Cornus-山茱萸属(shān zhū yú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶乔木
  株: 高达15(-20)米
  枝: 小枝紫红色，微被毛，皮孔及叶痕显著
  叶: 叶纸质，互生，宽椭圆形或卵状椭圆形，长5-14厘米，先端急尖，基部圆或宽楔形，全缘，下面密被白色短柔毛，侧脉6-7(8)对，弧形上升，近叶缘即网连，横出网脉在两面均明显；叶柄紫红色，长约2-6厘米，近无毛
  花: 顶生伞房状聚伞花序长约15厘米，微被伏生柔毛；总花梗长3-4厘米，稀被伏生柔毛；花白色，径约8毫米；花萼具三角状裂片4，外侧被短柔毛，高于花盘；花瓣4，长圆状披针形，长4-4.5毫米，先端钝尖，外侧疏被伏生短柔毛；雄蕊4，长4-4.5毫米，伸出花外，花丝线形，花药长圆形；花盘垫状；花柱长2-3毫米，柱头头状，较小；花托长圆形，密被灰白色伏生短柔毛；花梗长3-6毫米，被伏生白色短柔毛
  果: 核果圆球形，径约6-7毫米，成熟时紫红或蓝黑色；核的顶端具1方形小孔
生态习性:
  产地: 产辽宁以南我国湿润区或半湿润区，朝鲜、日本、南亚北部也有分布
  分布: 朝鲜、日本、印度北部、尼泊尔、锡金、不丹
  生境: 常绿阔叶林或针阔叶混交林中
  海拔: 250-2600m
  物候: 花期5-6月，果期7-10月
功用价值:
  经济价值: 可作行道树，果实供榨油
植物志: '22.欧洲红瑞木（新拟）图版30：4-7

  Swida sanguinea (Linn.) Opiz in Bercht. et Opiz. Oeckon. -Techn. Fl. Bohmens 2 (1): 174. 1838.——Svida sanguinea Opiz in Seznam, 94. 1852.——Cornus sanguinea Linn. Spec. Pl. ed 1. 171. 1753; Wanger. in Engl., Pflanzenreich, 41 (IV. 229): 73. 1910.

  灌木状乔木，高2-4米；幼枝淡绿色，疏被白色贴生短柔毛，干后略有4稜，老枝圆柱形，红褐色，无毛。冬芽顶生及腋生，扁圆锥形，长2-4毫米，疏被白色贴生短柔毛。叶对生，纸质，椭圆形或卵状椭圆形，长4-7.5厘米，宽2.5-4厘米，先端突尖，基部楔形至宽楔形，全缘，上面绿色，稀被淡白色贴生短柔毛，下面淡绿色，密被乳头状突起并有疏生白色卷曲毛，中脉在上面明显，下面凸出，疏生白色卷曲毛，侧脉3-4对，弓形内弯，在上面略明显，下面稍凸起；叶柄纤细，长0.8-1.8厘米，淡绿色，疏被白色短柔毛，上面有浅沟，下面圆形。顶生伞房状聚伞花序，连同3-3.3厘米长的总花梗在内，长5.8-6厘米，宽3.8-4.2厘米，稀被白色短柔毛；花少，白色，直径10毫米；花萼裂片4，尖三角形，长0.7毫米，稍长于花盘，外侧被淡白色平贴短柔毛；花瓣4，长圆披针形，长5毫米，宽1.3-1.5毫米，先端长渐尖形，上面无毛，下面有淡白色平贴短柔毛；雄蕊4，着生于花盘外侧，长5毫米，花丝线形，白色，长4毫米，无毛，花药淡黄色，长圆卵形，长1.8毫米，丁字形着生；花盘垫状，无毛，厚约0.5毫米；花柱棍棒形，长4.5毫米，近于无毛，柱头小，扁头形，子房下位，花托倒卵形，长1毫米，直径0.8毫米，密被白色平贴短柔毛；花梗细圆柱形，长5-6毫米，疏被淡白色平贴短柔毛。核果近于球形，直径7-7.6毫米，成熟时黑色，近于无毛；核骨质，近于球形，直径5.2毫米，略有10条不明显的肋纹。花期5月；果期9月。

  原产欧洲。江苏省有引种栽培。'
