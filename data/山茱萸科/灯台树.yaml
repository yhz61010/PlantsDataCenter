形态特征:
  生活型: 落叶乔木
  株: 高达15(-20)米
  枝: 小枝紫红色，微被毛，皮孔及叶痕显著
  叶: 叶纸质，互生，宽椭圆形或卵状椭圆形，长5-14厘米，先端急尖，基部圆或宽楔形，全缘，下面密被白色短柔毛，侧脉6-7(8)对，弧形上升，近叶缘即网连，横出网脉在两面均明显；叶柄紫红色，长约2-6厘米，近无毛
  花: 顶生伞房状聚伞花序长约15厘米，微被伏生柔毛；总花梗长3-4厘米，稀被伏生柔毛；花白色，径约8毫米；花萼具三角状裂片4，外侧被短柔毛，高于花盘；花瓣4，长圆状披针形，长4-4.5毫米，先端钝尖，外侧疏被伏生短柔毛；雄蕊4，长4-4.5毫米，伸出花外，花丝线形，花药长圆形；花盘垫状；花柱长2-3毫米，柱头头状，较小；花托长圆形，密被灰白色伏生短柔毛；花梗长3-6毫米，被伏生白色短柔毛
  果: 核果圆球形，径约6-7毫米，成熟时紫红或蓝黑色；核的顶端具1方形小孔
生态习性:
  产地: 产辽宁以南我国湿润区或半湿润区，朝鲜、日本、南亚北部也有分布
  分布: 朝鲜、日本、印度北部、尼泊尔、锡金、不丹
  生境: 常绿阔叶林或针阔叶混交林中
  海拔: 250-2600m
  物候: 花期5-6月，果期7-10月
功用价值:
  经济价值: 可作行道树，果实供榨油
植物志: 原产欧洲。江苏省有引种栽培。
