学名: Begonia cucullata Willd.
中文名: 四季秋海棠
俗名:
- 四季海棠
- 玻璃翠
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Cucurbitales-葫芦目
  科: Begoniaceae-秋海棠科
  属: Begonia-秋海棠属
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生常绿草本，茎直立，稍肉质
  株: 高15-30cm
  茎: 茎直立，稍肉质，高15-30cm
  叶: 单叶互生，有光泽，卵圆至广卵圆形，长5-8cm，宽3-6cm，先端急尖或钝，基部稍心形而斜生，边缘有小齿和缘毛，绿色
  花: 聚伞花序腋生，具数花，花红色，淡红色或白色
  果: 蒴果具翅
生态习性:
  分布: 原产巴西低纬度高海拔地区林下
  物候: 花期3-12月
  栽培: 喜阳光，稍耐荫，怕寒冷，喜温暖，稍阴湿的环境和湿润的土壤，但怕热及水涝；生长适温16℃-30℃
功用价值:
  经济价值: 本种花期极长，且开花繁茂，多用于林缘、草地或园路边栽培，也可用于布置花坛、花台等，效果极佳，成为重要的景观花卉，具有株型圆整、花多而密集、极易与其它花坛植物配植、因而越来越受到欢迎
植物志: 暂无数据
