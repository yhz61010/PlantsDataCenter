学名: Platanus acerifolia (Aiton) Willd.
中文名: 二球悬铃木
俗名:
- 英国梧桐
- 悬铃木
异名:
- Platanus × acerifolia
- Platanus hybrida
- Platanus orientalis var. acerifolia
- Platanus hybridus
描述: 落叶乔木，高可达35米。树皮光滑，大片剥落。叶掌状3–5裂。头状花序球形，果序常2个一串。花期4月，果期9–10月。为人工杂交种，我国广泛栽培。适应性极强、遮荫好，是城市行道、庭荫、工矿区绿化最常用树种。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Proteales-山龙眼目(shān lóng yǎn mù)
  科: Platanaceae-悬铃木科(xuán líng mù kē)
  属: Platanus-悬铃木属(xuán líng mù shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶大乔木
  株: 高达35米
  茎: 树皮光滑，片状脱落
  枝: 幼枝密被灰黄色星状绒毛，老枝无毛，红褐色
  叶: 叶宽卵形，长10-24厘米，宽12-25厘米，基部平截或微心形，幼叶两面被灰黄色星状绒毛，下面毛厚密，后脱落无毛，下面脉腋被毛，上部掌状3-5中裂，有时7裂，中裂片宽三角形，长宽约相等，裂片全缘或具1-2粗齿，掌状脉3(5)；叶柄长3-10厘米，密被黄褐色星状毛，托叶长1-1.5厘米，基部鞘状，上部开裂
  花: 花常4数；雄花萼片卵形，被毛；花瓣长圆形，长为萼片2倍；雄蕊长于花瓣，盾形药隔被毛
  果: 球形果序常2个串生，稀1或3个，下垂；果序径约2.5厘米，宿存花柱长2-3毫米，绒毛不突出
生态习性:
  分布: 我国南自两广及东南沿海，西南至四川、云南，北至辽宁均有栽培，在哈尔滨生长不良，呈灌木状
  物候: 花期4-5月，果期9-10月
  栽培: 喜光，耐寒、耐旱，也耐湿；对土壤要求不严，无论酸性、中性或碱性土均可生长，并耐盐碱；萌芽力强，耐修剪
功用价值:
  经济价值: 悬铃木树形雄伟端庄，叶大荫浓，干皮光滑，适应性强，为世界著名行道树和庭园树，被誉为“行道树之王”，世界各地广为栽培；适应性强，我国在黄河流域以南各地甚常见，东北南部也可应用，但在哈尔滨生长不良，呈灌木状
植物志: 本种是三球悬铃木 P. orientalis 与一球悬铃木 P. occidentalis 的杂交种，久经栽培，我国东北、华中及华南均有引种。
