备注: '2016年及之前将其归于“五福花科”。

  2017年的深圳植物学大会通过了保留 Viburnaceae 的提议，但否决了超保留 Adoxaceae(五福花科) 的提议。因此，按照优先权原则，本科学名

  应该用 Viburnaceae，中文名也随之改为“荚蒾科”。'
