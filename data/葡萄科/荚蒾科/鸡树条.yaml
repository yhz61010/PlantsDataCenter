形态特征:
  识别要点: 树皮质厚而多少呈木栓质。小枝、叶柄和总花梗均无毛。叶下面仅脉腋集聚簇状毛或有时脉上亦有少数长伏毛。花药紫红色。
  形态特征: 高可达4米；冬芽卵圆形，有柄，无毛，叶片轮廓圆卵形至广卵形或倒卵形，通常3裂，掌状，无毛，裂片顶端渐尖，边缘具不整齐粗牙齿，椭圆形至矩圆状披针形而不分裂，边缘疏生波状牙齿，叶柄粗壮，无毛，复伞形式聚伞花序，周围有大型的不孕花，总花梗粗壮，无毛，花生于第二至第三级辐射枝上，花梗极短；萼齿三角形，均无毛；花冠白色，辐状，花药黄白色，不孕花白色，果实红色，近圆形，
  生活型: 落叶灌木植物
  枝: 幼枝、叶下面、叶柄和总花梗均被带黄色长柔毛
生态习性:
  产地: 分布于黑龙江、吉林、辽宁、河北北部、山西、陕西南部、甘肃南部，河南西部、山东、安徽南部和西部、浙江西北部、江西、湖北和四川
  分布: 日本、朝鲜和俄罗斯西伯利亚东南部也有分布
  生境: 生于溪谷边疏林下或灌丛中，海拔1000-1650米
  海拔: 1200-2200m
  物候: 5-6月开花，果熟期9-10月
功用价值:
  经济价值: 该种枝叶可通经活络，解毒止痒，枝可用于风湿性关节炎，腰酸腿痛，跌打损伤；叶子可外用治疮疖，癣，皮肤瘙痒；鸡树条的果实能够止咳，常用于急、慢性气管炎，咳嗽
