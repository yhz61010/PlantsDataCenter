形态特征:
  生活型: 落叶乔木
  株: 高10-25米
  茎: 树皮浅裂至深纵裂，稀光滑
  枝: 小枝初被毛，后无毛；具托叶剌
  叶: 羽状复叶长10-25(-40)厘米；小叶2-12对，常对生，椭圆形、长椭圆形或卵形，长2-5厘米，先端圆，微凹，基部圆或宽楔形，全缘，幼时被短柔毛，后无毛
  花: 总状花序腋生，长10-20厘米，下垂；花芳香；花序轴与花梗被平伏细柔毛；花萼斜钟形，萼齿5，三角形或卵状三角形，密被柔毛；花冠白色，花瓣均具瓣柄，旗瓣近圆形，反折，翼瓣斜倒卵形，与旗瓣几等长，长约1.6厘米，龙骨瓣镰状，三角形；雄蕊二体；子房线形，无毛，花柱钻形，顶端具毛，柱头顶生
  果: 荚果线状长圆形，褐色或具红褐色斑纹，扁平，无毛，先端上弯，果颈短，沿腹缝线具窄翅；花萼宿存，具2-15种子
  种子: 种子近肾形，种脐圆形，偏于一端
生态习性:
  产地: 广泛栽植
  物候: 花期4-6月，果期8-9月
