学名: Robinia pseudoacacia L.
中文名: 刺槐
俗名:
- 洋槐
- 槐花
- 伞形洋槐
- 塔形洋槐
异名:
- Robinia pseudoacacia var. umbraculifera
- Robinia pseudoacacia var. pyramidalis
- Robinia pyramidalis
- Robinia pseudoacacia var. inermis
描述: 落叶乔木，高可达25米。树皮褐色，纵裂。小枝具托叶刺。奇数羽状复叶，小叶7–19枚，卵形。总状花序腋生，花白色，芳香。荚果扁平，带状。花期4–6月，果期8–9月。原产北美，我国各地广泛栽培。速生、耐旱、耐贫瘠，为造林、行道、蜜源、用材优良树种。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Fabales-豆目(dòu mù)
  科: Fabaceae-豆科(dòu kē)
  属: Robinia-刺槐属(cì huái shǔ)
