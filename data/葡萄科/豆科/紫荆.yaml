学名: Cercis chinensis Bunge
中文名: 紫荆
俗名:
- 紫珠
- 裸枝树
- 满条红
- 白花紫荆
- 白花紫荆
- 短毛紫荆
异名:
- Cercis chinensis f. alba
- Cercis chinensis f. pubescens
- Cercis pauciflora
- Cercis chinensis f. rosea
描述: 落叶灌木，高5米；叶近圆形，基部心形；花紫红或粉红色，2-10余朵成束，簇生于老枝和主干上，常先叶开放；荚果；花期3-4月，果期8-10月。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Fabales-豆目(dòu mù)
  科: Fabaceae-豆科(dòu kē)
  属: Cercis-紫荆属(zǐ jīng shǔ)
  濒危等级: 无危(LC)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  识别要点: 本变型与模式变型的区别：小枝、叶柄以及叶下面沿脉均被短柔毛
  生活型: 灌木
  株: 高达5米
  枝: 小枝灰白色，无毛
  叶: 叶近圆形或三角状圆形，长5-10厘米，先端急尖，基部浅或深心形，两面通常无毛，叶缘膜质透明；叶柄长2.5-4厘米，无毛
  花: 花紫红或粉红色，2-10余朵成束，簇生于老枝和主干上，尤以主干上花束较多，越到上部幼嫩枝条则花越少，常先叶开放，幼嫩枝上的花则与叶同时开放；花长1-1.3厘米；花梗长3-9毫米；龙骨瓣基部有深紫色斑纹；子房嫩绿色，花蕾时光亮无毛，后期则密被短柔毛，胚珠6-7
  果: 荚果扁，窄长圆形，绿色，长4-8厘米，宽1-1.2厘米，翅宽约1.5毫米，顶端急尖或短渐尖，喙细而弯曲，基部长渐尖，两侧缝线对称或近对称；果颈长2-4毫米
  种子: 种子2-6，宽长圆形，长5-6毫米，黑褐色，光亮
生态习性:
  产地: 东南部、北至河北、南至广东、广西、西至云南、四川、西北至陕西、东至浙江、江苏和山东等省区
  生境: 为一常见的栽培植物，多植于庭园、屋旁、寺街边，少数密林或石灰岩地区
  物候: 花期3-4月，果期8-10月
功用价值:
  经济价值: 本种是一美丽的木本花卉植物；树皮可入药，有清热解毒，活血行气，消肿止痛之功效，可治产后血气痛、疗疮肿毒、喉痹；花可治风湿筋骨痛
  植物文化: '风吹紫荆树，色与春庭暮

    花落辞故枝，风回返无处；

    骨肉恩书重，漂泊难相遇；

    犹有泪成河，经天复东注；

    ——唐 杜甫《得舍弟消息》'
植物志: 暂无数据
