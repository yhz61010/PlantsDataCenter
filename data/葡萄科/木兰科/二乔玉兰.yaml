学名: Yulania × soulangeana (Soul.-Bod.) D. L. Fu
中文名: 二乔玉兰
俗名:
- 二乔木兰
异名:
- Magnolia soulangeana
- Magnolia yulan var. soulangeana
- Magnolia × soulangeana
- Magnolia × soulangiana
- Yulania soulangeana
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Magnoliales-木兰目(mù lán mù)
  科: Magnoliaceae-木兰科(mù lán kē)
  属: Yulania-玉兰属(yù lán shǔ)
物种保护: 暂无数据
分类信息:
  分类讨论: 本种是玉兰与辛夷的杂交种
形态特征:
  识别要点: 花被片大小形状不等，紫色或有时近白色，芳香或无芳香
  生活型: 落叶小乔木
  株: 高6-10米
  枝: 小枝无毛
  叶: 叶倒卵形或宽倒卵形，先端宽圆，下面具柔毛
  花: 花蕾卵圆形，花先叶开放，浅红色至深红色，花被片6-9，外轮3片花被片常较短约为内轮长的2/3；雄蕊长1-1.2厘米，花药长约5毫米，侧向开裂，药隔伸出成短尖，雌蕊群无毛，圆柱形，长约1.5厘米
  果: 聚合果长约8厘米，直径约3厘米；蓇葖卵圆形或倒卵圆形，长1-1.5厘米，熟时黑色，具白色皮孔
  种子: 种子深褐色，宽倒卵圆形或倒卵圆形，侧扁
生态习性:
  产地: 杭州、广州、昆明有栽培。
  物候: 花期2-3月，果期9-10月。
  栽培: 耐寒、耐旱、移植难
功用价值:
  经济价值: 著名观赏树木，国内外庭园中均常见栽培；本种的花被片大小形状不等，紫色或有时近白色，芳香或无芳香。在园艺栽培约有20栽培种。
  植物文化: 玉兰 [作者] 陈辅 [朝代] 宋 内史北轩多种竹， 隐居南洞少栽花； 蓝桥西路青青处， 拾得璚儿似虎牙
植物志: 本种是玉兰与辛夷的杂交种，杭州、广州、昆明有栽培，本种的花被片大小形状不等，紫色或有时近白色，芳香或无芳香。在园艺栽培约有20栽培种。
