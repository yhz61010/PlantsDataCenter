形态特征:
  生活型: 木质落叶大藤本
  枝: 小枝无毛或嫩时被极稀疏柔毛，老枝无木栓翅
  叶: 单叶，倒卵圆形，通常3裂，幼苗或下部枝上叶较小，长4.5-20厘米，基部心形，有粗锯齿，两面无毛或下面脉上有短柔毛；叶柄长4-20厘米，无毛或疏生短柔毛
  花: 花序生短枝上，基部分枝，形成多歧聚伞花序，序轴不明显，花序梗长1-3.5厘米；花萼碟形，边缘全缘或呈波状，无毛；花瓣长椭圆形
  果: 果球形，成熟时蓝色，径1-1.5厘米，有种子1-3
生态习性:
  产地: 吉林、辽宁、河北、河南、山东、安徽、江苏、浙江、福建、台湾
  分布: 朝鲜、日本
  特有: 特产
  生境: 山坡崖石壁或灌丛
  海拔: 150-1200m
  物候: 花期5-8月，果期9-10月
功用价值: 暂无数据
植物志: '产吉林、辽宁、河北、河南、山东、安徽、江苏、浙江、福建、台湾。生山坡崖石壁或灌丛，海拔150-1200米。朝鲜、日本也有分布。

  本种早为著名的垂直绿化植物，枝叶茂密，分枝多而斜展；根入药，能祛瘀消肿。

  春季刚萌发的新叶因花青素含量较高，呈现你之前拍到的紫红色；随着叶片生长、叶绿素大量合成，就会转成这种鲜亮的翠绿色；入秋后气温下降，叶片会再次积累花青素，变为艳丽的橙红色，季相观赏效果突出。

  春之序曲（萌发期）：鲜亮紫红（花青素的保护伞）

  夏之盛宴（成熟期）：转为深绿（高效的能量工厂）

  秋之谢幕（谢幕期）：橙红如火（震撼的季相高潮）'
