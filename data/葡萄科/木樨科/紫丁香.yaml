学名: Syringa oblata Lindl.
中文名: 紫丁香
俗名:
- 白丁香
- 毛紫丁香
- 华北紫丁香
- 丁香
异名:
- Syringa giraldii
- Syringa vulgaris var. oblata
- Syringa oblata var. hupehensis
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Oleaceae-木樨科(mù xī kē)
  属: Syringa-丁香属(dīng xiāng shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  识别要点: 与原变种区别在于本变种的小枝、花序和花梗除具腺毛外，被微柔毛或短柔毛，或无毛；叶片基部通常为宽楔形、近圆形至截形，或近心形，上面除有腺毛外，被短柔毛或无毛，下面被短柔毛或柔毛，有时老时脱落；叶柄被短柔毛、柔毛或无毛
  生活型: 灌木或小乔木
  枝: 小枝、花序轴、花梗、苞片、花萼、幼叶两面及叶柄均密被腺毛
  叶: 叶革质或厚纸质，卵圆形或肾形，长2-14厘米，宽2-15厘米，先端短凸尖或长渐尖，基部心形、平截或宽楔形；叶柄长1-3厘米
  花: 圆锥花序直立，由侧芽抽生；花梗长0.5-3毫米；花萼长约3毫米；花冠紫色，花冠筒圆柱形，长0.8-1.7厘米，裂片直角开展，长3-6毫米；花药黄色，位于花冠筒喉部
  果: 果卵圆形或长椭圆形，长1-1.5(-2)厘米，顶端长渐尖，几无皮孔
生态习性:
  产地: 东北、华北、西北（除新疆）以至西南达四川西北部（松潘、南坪）
  生境: 山坡丛林、山沟溪边、山谷路旁及滩地水边
  海拔: 300-2400m
  物候: 花期4-5月，果期6-10月
功用价值:
  经济价值: 观赏植物，全国普遍栽培；其吸收SO2的能力较强，对SO2污染具有一定净化作用；花可提制芳香油；嫩叶可代茶
  植物文化: '手卷真珠上玉钩，依前春恨锁重楼；风里落花谁是主？思悠悠

    青鸟不传云外信，丁香空结雨中愁；回首绿波三楚暮，接天流；

    ——五代 李璟《摊破浣溪沙》'
植物志: '其吸收SO2的能力较强，对SO2污染具有一定净化作用；花可提制芳香油；嫩叶可代茶。

  白丁香（变种）（河北习见树木图说）　白花丁香（东北木本植物图志）

  花白色；叶片较小，基部通常为截形、圆楔形至近圆形，或近心形。花期4-5月。

  我国长江流域以北普遍栽培。

  采自辽宁东南部的某些标本，过去被鉴定为 S. dilatata var. alba Wang & Skv.，可能是本种的野生类型。

  毛紫丁香（变种）（中国高等植物图鉴）　紫萼丁香（中国树木分类学）

  与原变种区别在于本变种的小枝、花序和花梗除具腺毛外，被微柔毛或短柔毛，或无毛；叶片基部通常为宽楔形、近圆形至截形，或近心形，上面除有腺毛外，被短柔毛或无毛，下面被短柔毛或柔毛，有时老时脱落；叶柄被短柔毛、柔毛或无毛。花期5月，果期7-9月。

  产于甘肃、陕西、湖北以至东北。生海拔1 100-2 600米的山坡林下或灌丛中。模式标本采自陕西。

  1918，Nakai 根据朝鲜标本发表了 S. dilatata Nakai. 1926，Rehder 又把它作为 S. obiaca Lindl. 的变种。根据我国现有标本以及野外观察，从 S. vblata 中难以区分出 S. dilatata，如果后者确实成立，则我国可能无野生。

