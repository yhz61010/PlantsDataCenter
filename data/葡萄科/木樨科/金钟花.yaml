学名: Forsythia viridissima Lindl.
中文名: 金钟花
俗名:
- 连翘
- 黄金条
异名:
- Rangium viridissimum
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Oleaceae-木樨科(mù xī kē)
  属: Forsythia-连翘属(lián qiáo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 落叶灌木；全株除花萼裂片边缘具睫毛外，余无毛
  枝: 小枝具片状髓
  叶: 单叶，长椭圆形或披针形，长3.5-15厘米，宽1-4厘米，先端锐尖，基部楔形，上部常具不规则锐齿或粗齿，稀近全缘，两面无毛；叶柄长0.6-1.2厘米
  花: 花1-3(4)朵生于叶腋，先叶开花；花梗长3-7毫米；花萼裂片卵形或长圆形，长2-4毫米，具睫毛；花冠深黄色，长1.1-2.5厘米，花冠筒长5-6毫米，裂片窄长圆形，反卷；在雄蕊长3.5-5毫米的花中，雌蕊长5.5-7毫米，在雄蕊长6-7毫米的花中，雌蕊长约3毫米
  果: 果卵圆形或宽卵圆形，长1-1.5厘米，先端喙状渐尖，具皮孔
生态习性:
  产地: 除华南地区外，全国各地均有栽培，尤以长江流域一带栽培较为普遍
  生境: 山地、谷地或河谷边林缘；溪沟边或山坡路旁灌丛中
  海拔: 300-2600m
  物候: 花期3-4月，果期8-11月
功用价值:
  植物文化: 江南酒，何处味偏浓；醉卧春风深巷里，晓寻香旆小桥东；竹叶满金钟； 檀板醉，人面粉生红；青杏黄梅朱阁上，鲥鱼苦笋玉盘中；酩酊任愁攻； ——宋 王琪《望江南 二》
植物志: 暂无数据
