形态特征:
  生活型: 一年生草本
  株: 高达1米
  茎: 茎直立，基部分枝，具绿色或紫红色条纹；枝伸展，生短硬毛或近无毛
  叶: 叶圆柱状，条形，长2-5厘米，宽0.5-1.5毫米，先端具刺尖，基部稍宽并具膜质边缘，下延
  花: 花单生于枝上部苞腋，组成穗状花序；苞片卵形，紧贴于轴，先端渐尖，背面具微隆脊，小苞片窄披针形；花被片卵状披针形，膜质，果时硬化，背面的附属物呈鸡冠状，花被片附属物以上部分近革质，内折，先端膜质；花药长1-1.5毫米柱头丝状，花柱很短
  种子: 种子横生或斜生
生态习性:
  产地: 东北、华北、西北、西南及西藏、河南、山东、江苏等省区
  分布: 朝鲜、蒙古、俄罗斯、巴基斯坦
  生境: 村边，路边及荒芜场所
  物候: 花期7-9月，果期9-10月
