学名: Oenothera speciosa Nutt.
中文名: 美丽月见草
俗名:
- 粉晚樱草
- 粉花月见草
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Myrtales-桃金娘目(táo jīn niáng mù)
  科: Onagraceae-柳叶菜科(liǔ yè cài kē)
  属: Oenothera-月见草属(yuè jiàn cǎo shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本植物，株高40-50cm
  叶: 叶互生，披针形，先端尖，基部楔形，下部有波缘或疏齿，上部近全缘，绿色
  花: 花单生或2朵着生于茎上部叶腋，花瓣4，粉红色，具暗色脉缘，雄蕊黄色，雌蕊白色
  果: 蒴果
生态习性:
  分布: 美国
  特有: 特产
  物候: 花期夏季
  栽培: 性喜温暖及光照充足环境，不耐寒，较耐旱，忌水湿；对土壤要求不严，以疏松、肥沃的壤土为宜；生长适温15℃-30℃
功用价值:
  经济价值: 花大而美丽，常成片开放，极为壮观，为极优的观花草本；可片植于园路边、疏林下、庭前观赏，也常用于花境、花坛、花台栽培，也适合用作观花地被植物
植物志: 暂无数据
