学名: Impatiens hawkeri W. Bull
中文名: 新几内亚凤仙花
俗名:
- 五彩凤仙花
- 四季凤仙
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Ericales-杜鹃花目
  科: Balsaminaceae-凤仙花科
  属: Impatiens-凤仙花属
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生肉质草本，株高20-30cm
  茎: 茎直立，淡红色
  叶: 叶互生，长卵形，先端尖，基部楔形，叶绿色或具淡紫色，叶脉紫红色，叶缘具锯齿
  花: 花单生叶腋，花色丰富，有红、白、紫、雪青等色
生态习性:
  分布: 非洲
  物候: 花期夏至秋
  栽培: 喜温暖及光照充足的环境，但忌强光，不耐寒，不耐暑热，忌水涝，喜疏松、排水良好的微酸性土壤；生长适温15℃-26℃
功用价值:
  经济价值: 新几内亚凤仙花色丰富、花期长，为广受欢迎的观花草本，除盆栽用于室内装饰外，可用于园路边、林缘、山石边或草地中丛植或片植观赏，也常用于花坛、花境或与其他观花植物配植
植物志: 暂无数据
