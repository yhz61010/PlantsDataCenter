分类信息:
  模式产地: 模式标本采自四川城口
形态特征:
  生活型: 多年生草本
  茎: 茎上部分枝
  叶: 基生叶莲座状，匙形至长椭圆形，基部渐窄成宽翼柄，不裂或大头羽状深裂，上部叶心状披针形，多全缘，基部心形或圆耳状抱茎
  花: 头状花序排成伞房或伞房圆锥花序，总苞圆柱形，舌状小花黄色
  果: 瘦果黑色，纺锤形，喙细丝状，冠毛白色
生态习性:
  产地: 分布辽宁（铁岭、沈阳、大连）、河北（内丘、兴隆）、山西（太原、阳曲、娄烦、沁县、离山、垣曲、芮城、中阳、霍县、永济、晋城、五台、吕梁）、内蒙古（大青山）、陕西（靖边、安康、米脂、绥德、勉县）、甘肃（平凉、天水、兰州、武山、文县、通渭、合水）、山东（济南、青岛、烟台）、江苏（南京、淮安、南通）、浙江〔杭州、昌化）、河南（潢川）、湖北（宣恩、巴东、宜昌）、四川（奉节、南川、成都）、贵州（正安）
  分布: 朝鲜、日本
  生境: 山坡或平原路旁、林下、河滩地、岩石上或庭院中
  海拔: 100-2700m
  物候: 花果期3-5月
功用价值:
  经济价值: 全草入药，清热解毒，有凉血、活血之功效
植物志: 分布黑龙江（哈尔滨）、吉林（长春）、河北（张家口、保康、承德）、山东（青岛）、河南（西峡）。生于山坡草地，海拔850-1 530米。俄罗斯远东地区、朝鲜有分布。模式标本采自俄罗斯远东地区。
