学名: Tagetes erecta L.
中文名: 万寿菊
俗名:
- 孔雀菊
- 缎子花
- 臭菊花
- 西番菊
- 红黄草
- 小万寿菊
- 臭芙蓉
- 孔雀草
异名:
- Tagetes patula
- Tagetes tenuifolia
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Tagetes-万寿菊属(wàn shòu jú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 一年生草本
  茎: 茎近基部分枝
  叶: 叶羽状分裂，长5-10厘米，宽4-8厘米，裂片长椭圆形或披针形，具锐齿，上部叶裂片齿端有长细芒，叶缘有少数腺体
  花: 头状花序单生，径5-8厘米，花序梗顶端棍棒状；总苞长1.8-2厘米，径1-1.5厘米，杯状，顶端具尖齿；舌状花黄或暗橙黄色，长2.9厘米，舌片倒卵形，长1.4厘米，基部成长爪，先端微弯缺；管状花花冠黄色，长约9毫米，冠檐5齿裂
  果: 瘦果线形，被微毛；冠毛有1-2长芒和2-3短而钝鳞片
生态习性:
  产地: 我国各地均有栽培；在广东和云南南部、东南部已归化
  分布: 原产墨西哥
  物候: 花期7-9月
功用价值: 暂无数据
植物志: 原产墨西哥。我国各地均有栽培。在广东和云南南部、东南部已归化。
