学名: Gaillardia pulchella Foug.
中文名: 天人菊
俗名:
- 老虎皮菊
- 虎皮菊
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Gaillardia-天人菊属(tiān rén jú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 一年生草本
  茎: 茎中部以上多分枝，被柔毛或锈色毛
  叶: 下部叶匙形或倒披针形，长5-10厘米，边缘波状钝齿、浅裂或琴状分裂，近无柄；上部叶长椭圆形、倒披针形或匙形，长3-9厘米，全缘或上部有疏锯齿或中部以上3浅裂，基部无柄或心形半抱茎；叶两面被伏毛
  花: 头状花序径5厘米；总苞片披针形，长1.5厘米，边缘有长缘毛，背面有腺点，基部密被长柔毛；舌状花黄色，基部带紫色，舌片宽楔形，长1厘米，先端2-3裂；管状花裂片三角形，顶端芒状，被节毛
  果: 瘦果长2毫米，基部被长柔毛；冠毛长5毫米
生态习性:
  物候: 花果期6-8月
功用价值: 暂无数据
植物志: '庭园栽培，供观赏。

  矢车天人菊 var. picta A. Gray 叶多肉质，舌状花顶端5裂，红紫色，是通常栽培的园艺品种。

