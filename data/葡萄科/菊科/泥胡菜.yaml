描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Hemisteptia-泥胡菜属(ní hú cài shǔ)
物种保护: 暂无数据
分类信息:
  模式产地: 模式标本采自我国东部
形态特征:
  生活型: 一年生草本
  株: 高30-100厘米。
  茎: 茎单生，很少簇生，通常纤细，被稀疏蛛丝毛，上部长分枝，少有不分枝的。
  叶: 基生叶长椭圆形或倒披针形，花期通常枯萎；中下部茎叶与基生叶同形，长4-15厘米或更长，宽1.5-5厘米或更宽，全部叶大头羽状深裂或几全裂，侧裂片2-6对，通常4-6对，极少为1对，倒卵形、长椭圆形、匙形、倒披针形或披针形，向基部的侧裂片渐小，顶裂片大，长菱形、三角形或卵形，全部裂片边缘三角形锯齿或重锯齿，侧裂片边缘通常稀锯齿，最下部侧裂片通常无锯齿；有时全部茎叶不裂或下部茎叶不裂，边缘有锯齿或无锯齿。全部茎叶质地薄，两面异色，上面绿色，无毛，下面灰白色，被厚或薄绒毛，基生叶及下部茎叶有长叶柄，叶柄长达8厘米，柄基扩大抱茎，上部茎叶的叶柄渐短，最上部茎叶无柄。
  花: 头状花序在茎枝顶端排成疏松伞房花序，少有植株仅含一个头状花序而单生茎顶的。总苞宽钟状或半球形，直径1.5-3厘米。总苞片多层，覆瓦状排列，最外层长三角形，长2毫米，宽1.3毫米；外层及中层椭圆形或卵状椭圆形，长2-4毫米，宽1.4-1.5毫米；最内层线状长椭圆形或长椭圆形，长7-10毫米，宽1.8毫米。全部苞片质地薄，草质，中外层苞片外面上方近顶端有直立的鸡冠状突起的附片，附片紫红色，内层苞片顶端长渐尖，上方染红色，但无鸡冠状突起的附片。小花紫色或红色，花冠长1.4厘米，檐部长3毫米，深5裂，花冠裂片线形，长2.5毫米，细管部为细丝状，长1.1厘米。
  果: 瘦果小，楔状或偏斜楔形，长2.2毫米，深褐色，压扁，有13-16条粗细不等的突起的尖细肋，顶端斜截形，有膜质果缘，基底着生面平或稍见偏斜。冠毛异型，白色，两层，外层冠毛刚毛羽毛状，长1.3厘米，基部连合成环，整体脱落；内层冠毛刚毛极短，鳞片状，3-9个，着生一侧，宿存。
生态习性:
  产地: 除新疆、西藏外，遍布全国
  分布: 朝鲜、日本、中南半岛、南亚及澳大利亚普遍分布
  生境: 山坡、山谷、平原、丘陵；林缘、林下、草地、荒地、田间、河边、路旁等处普遍有之
  海拔: 50-3280m
  物候: 花果期3-8月
功用价值: 暂无数据
植物志: 除新疆、西藏外，遍布全国。生于山坡、山谷、平原、丘陵，林缘、林下、草地、荒地、田间、河边、路旁等处普遍有之，海拔50-3280米。朝鲜、日本、中南半岛、南亚及澳大利亚普遍分布。模式标本采自我国东部。
