学名: Coreopsis grandiflora Hogg ex Sweet
中文名: 大花金鸡菊
俗名:
- 大花波斯菊(dà huā bō sī jú)
异名: 无
描述: 暂无数据
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Asterales-菊目(jú mù)
  科: Asteraceae-菊科(jú kē)
  属: Coreopsis-金鸡菊属(jīn jī jú shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 多年生草本
  茎: 茎无毛或基部被软毛，上部有分枝
  叶: 茎基部叶成对簇生，叶匙形或线状倒披针形，长3.5-7厘米；茎上部叶全缘或3深裂，裂片长圆形或线状披针形，顶裂片长6-8厘米，叶柄长6-7厘米；下部叶羽状全裂，裂片线形或线状长圆形；上部叶线形或线状披针形，无柄
  花: 头状花序单生茎端，径4-5厘米；总苞片近等长，披针形，长0.6-1厘米；舌状花黄色，舌片倒卵形或楔形；管状花窄钟形
  果: 瘦果宽椭圆形或近圆形，边缘翅较厚，内凹成耳状，内面有多数小瘤突
生态习性:
  分布: 原产美洲的观赏植物，在我国各地常栽培，有时归化逸为野生
  物候: 花期5-9月
功用价值: 暂无数据
植物志: 原产美洲的观赏植物，在我国各地常栽培，有时归化逸为野生。
