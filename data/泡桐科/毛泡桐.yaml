学名: Paulownia tomentosa (Thunb.) Steud.
中文名: 毛泡桐
俗名:
- 紫花桐
- 泡桐
异名:
- Paulownia imperialis
- Paulownia grandifolia
- Paulownia recurva
- Paulownia lilacina
- Incarvillea tomentosa
- Bignonia tomentosa
- Paulownia tomentosa var. lanata
- Paulownia tomentosa var. japonica
- Paulownia imperialis var. lanata
描述: 乔木，高达20米；叶心形，长达40厘米；小聚伞花序，花萼外被绒毛，花冠紫色；花期4-5月；中国特有树种，常见栽培。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Lamiales-唇形目(chún xíng mù)
  科: Paulowniaceae-泡桐科(pāo tóng kē)
  属: Paulownia-泡桐属(pāo tóng shǔ)
物种保护: 暂无数据
分类信息: 暂无数据
形态特征:
  生活型: 乔木
  株: 高达20米，树冠宽大伞形，树皮褐灰色
  枝: 小枝有明显皮孔，幼时常具粘质短腺毛
  叶: 叶心形，长达40厘米，先端锐尖，基部心形，全缘或波状浅裂，上面毛稀疏；下面毛密或较疏，老叶下面灰褐色树枝状毛常具柄和3-12条细长丝状分枝，新枝上的叶较大，其毛常不分枝，有时具粘质腺毛；叶柄常有粘质短腺毛
  花: 花萼浅钟形，长约1.5厘米，外面绒毛不脱落，分裂至中部或裂过中部，萼齿卵状长圆形，在花期锐尖或稍钝至果期钝头；花冠紫色，漏斗状钟形，长5-7.5厘米，在离管基部约5毫米处弓曲，向上突然膨大，外面有腺毛，内面几无毛，檐部二唇形，径约4.5厘米；雄蕊长达2.5厘米；子房卵圆形，有腺毛，花柱短于雄蕊
  果: 蒴果卵圆形，幼时密生粘质腺毛，长3-4.5厘米，宿萼不反卷，果皮厚约1毫米
  种子: 种子连翅长约2.5-4毫米
生态习性:
  物候: 花期4-5月，果期8-9月
功用价值:
  植物文化: "《诗经·大雅·卷阿》\n凤凰鸣矣，于彼高岗。\n梧桐生矣，于彼朝阳。 \n\n《游东堂咏桐》\n谢眺【南朝】\n孤桐北窗外，高枝百尺余； \n叶生既婀娜，落叶更扶疏。 \n\n《天上谣》\n李贺【唐】\n天河夜转漂回星，银浦流云学水声。\n玉宫桂树花未落，仙妾采香垂珮缨。\n秦妃卷帘北窗晓，窗前植桐青凤小。\n王子吹笙鹅管长，呼龙耕烟种瑶草。\n粉霞红绶藕丝裙，青洲步拾兰苕春。\n东指羲和能走马，海尘新生石山下。"
植物志: '分布于辽宁南部、河北、河南、山东、江苏、安徽、湖北、江西等地，通常栽培，西部地区有野生。海拔可达1800米。日本，朝鲜，欧洲和北美洲也有引种栽培。

  本种在被毛疏密，花枝及花冠大小，萼齿尖钝等方面常因生境和海拔高低而有变异，生长在海拔较高处，有花枝变小、萼齿在花期较钝、花冠稍短缩的趋势。

  该种较耐干旱与瘠薄，在北方较寒冷和干旱地区尤为适宜，但主干低矮，生长速度较慢。

  光泡桐（变种）

  本变种和毛泡桐的主要区别在于成熟叶片下面无毛或毛极稀疏，基部圆形至浅心脏形。

  分布于陕西、甘肃、山西、河北、河南、山东、湖北、四川北部，栽培或野生，海拔可达1700米。

