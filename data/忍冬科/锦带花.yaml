形态特征:
  生活型: 落叶灌木
  株: 高达1-3米
  茎: 树皮灰色
  枝: 芽顶端尖，具3-4对鳞片，常光滑
  叶: 叶矩圆形、椭圆形至倒卵状椭圆形，长5-10厘米，顶端渐尖，基部阔楔形至圆形，边缘有锯齿，上面疏生短柔毛，脉上毛较密，下面密生短柔毛或绒毛，具短柄至无柄
  花: 花单生或成聚伞花序生于侧生短枝的叶腋或枝顶；萼筒长圆柱形，疏被柔毛，萼齿长约1厘米，不等，深达萼檐中部；花冠紫红色或玫瑰红色，长3-4厘米，直径2厘米，外面疏生短柔毛，裂片不整齐，开展，内面浅红色；花丝短于花冠，花药黄色；子房上部的腺体黄绿色，花柱细长，柱头2裂
  果: 果实长1.5-2.5厘米，顶有短柄状喙，疏生柔毛；种子无翅
生态习性:
  产地: 黑龙江、吉林、辽宁、内蒙古、山西、陕西、河南、山东北部、江苏北部等地
  分布: 俄罗斯、朝鲜和日本
  生境: 杂木林下或山顶灌木丛中
  海拔: 100-1450m
  物候: 花期4-6月
功用价值:
  植物文化: '妍红棠棣妆，弱绿蔷薇枝；

    小风一再来，飘飘随舞衣；

    吴下妩芳槛，峡中满荒陂；

    佳人堕空谷，皎皎白驹诗；

    ——宋 范成大《锦带花》'
植物志: '据《东北木本植物图志》记载，我国东北及朝鲜有早锦带花 W. praecox (Lemoine) Bailey 分布，认为本种与早锦带花外形极相似，很易混淆，其主要区别为本种叶下面主脉上有密的白色毡毛。早锦带花（Diervilla praecox）一名最初出现于园艺名录上，为非专门性发表。根据我国东北的大量蜡叶标本观察，枝叶长出后因老嫩不同而毛被也常有差异，实不足为定种的唯一特征依据。

  一般常用 W. hybrida Hort. 一名来称谓园艺上的杂交种。由于杂交种外形上与本种比较相近，常认为与本种有关，但它们在花的颜色、大小、开花季节和花数的多少方面都有很大变化。其亲本究竟是哪个种？是否与本种有关？有待园艺方面作进一步研究。'
