学名: Weigela 'Red Prince'
中文名: 红王子锦带花
俗名:
- 红王子锦带
异名: 无
描述: 红王子锦带花为目前园艺上最常见的锦带花类品种之一，其分类学位置存在争议；多数植物园将其分为锦带花（Weigela florida）的栽培品种，但按花萼形态，其更可能为日本锦带花（W. japonica）或朝鲜锦带花（W. coraeensis）的品种，为避免争议，本词条按英国皇家园艺学会（RHS）登记信息，将该品种处理为属级栽培种。
分类系统:
  界: Plantae-植物界(zhí wù jiè)
  门: Tracheophyta-维管植物门(wéi guǎn zhí wù mén)
  纲: Magnoliopsida-木兰纲(mù lán gāng)
  目: Dipsacales-川续断目(chuān xù duàn mù)
  科: Caprifoliaceae-忍冬科(rěn dōng kē)
  属: Weigela-锦带花属(jǐn dài huā shǔ)
物种保护: 暂无数据
分类信息:
  学名释意: Weigela 'Red Prince' （Syn. Weigela florida 'Red Prince'）
形态特征:
  生活型: 灌木
  株: 高达3米。
  枝: 幼枝有2列短柔毛。
  叶: 叶具短柄或近无柄，椭圆形至倒卵状椭圆形，长5-10厘米，顶端渐尖，基部近圆形至楔形，边有锯齿，上面疏生短柔毛尤以中脉为甚，下面的毛较上面密。
  花: 1花的聚伞花序生短枝叶腋和顶端；花大，鲜红色；萼筒长12-15毫米，裂片5，长8-12毫米，下部合生；花冠漏斗状钟形，长3-4厘米，外疏生微毛，裂片5；雄蕊5，着生于花冠中部以上，稍短于花冠。
  果: 蒴果长1.5-2厘米，顶有短柄状喙，疏生柔毛，2瓣室间开裂；种子微小而多数。
